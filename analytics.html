<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .statsContainer {
            margin-top:50px;
            display:flex;
            justify-content: center;
            align-items: center;
        }
        .statsBox {
            width: 600px;
            border: 2px solid black;
            padding: 20px;
            background: white;
        }
    </style>
 <body>
        
        
        <!--Topic stats display -->
     <div class='statsContainer'>
         <div class='statsBox'>
         <h2 id="topicName">Overall Performance</h2>
        <div style="margin-top: 20px;">
            <div>
                Total Accuracy:
                <span id="accuracy">0%</span>
            </div>
            
            <div>
                Total Questions
                <span id="totalQuestions">0</span>
            </div>
            
            <div >
                Correct Answers
                <span id="correct">0</span>
            </div>
            
            <div>
                Incorrect Answers
                <span id="incorrect">0</span>
            </div>
            </div>
        </div>
 </div>
 </div>
     <div class='strengthsContainer'>
         <div class='strenghtsBox'>
             <h2>Strenghts</h2>
             <div id='strengthsList'>
         </div>
         
     </div>
 </body>
     <Script>
         
    //The supabase url
    const supabase_url = 'https://pxjndwrkafegopsolnde.supabase.co'
    //Supabase key
    const supabase_key = 'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
    //Initialize supabase client
    const supabaseClient = supabase.createClient(
      'https://pxjndwrkafegopsolnde.supabase.co',
      'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
    );
    let studentId = 'StudentTest';

    //Function to load overall stats
    async function loadOverallStats() {
        const{data: scores} = await supabaseClient
            .from('topic_performance')
            .select('*')
            .eq('student_id', studentId);
        console.log(scores);
        const performance = scores;

        //Variables to store totals
        let totalQuestions = 0;
        let totalCorrect = 0;
        console.log(performance)

        //Loop through each row
        performance.forEach( p => {
            totalQuestions += p.questions_attempted || 0;
            totalCorrect += p.questions_correct || 0;


                                  

  
        });
                //Calculate Incorrect and Accuracy.s
        const totalIncorrect = totalQuestions - totalCorrect;
        const totalAccuracy = totalQuestions > 0 ? Math.round((totalCorrect/totalQuestions) * 100) : 0;
        console.log('total Questions ', totalQuestions);
        console.log('total correct ', totalCorrect)
        console.log('total incorrect ', totalIncorrect)
        console.log('total accuracy ', totalAccuracy)

        //Update html of elements
        document.getElementById('accuracy').textContent = totalAccuracy + '%';
        document.getElementById('totalQuestions').textContent = totalQuestions;
        document.getElementById('correct').textContent = totalCorrect;
        document.getElementById('incorrect').textContent = totalIncorrect;

    };
    //Function to get strengths and place it in the HTML
    async function loadStrengths() {
        //Query Strengths
        const{data: strengths, error} = await supabaseClient
            .from('strengths')
            .select('topics(topic_name)')
            .eq('student_id', studentId);
        //Create divs for all the strengths
        strengths.forEach ( s => {
            const div = document.createElement('div');
            div.className = 'strengthItem';
            div.textContent = s.topics.topic_name;
            strengthsList.appendChild(div);
            
            });
        
    }
        
    document.addEventListener('DOMContentLoaded', function() {
       loadOverallStats(); 
        loadStrengths();
    });
     </Script>
 </body> 
</body>
</html>
