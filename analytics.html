<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* minimal CSS - only what's absolutely necessary */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
        }
        /* navbar from main.html */
        .navbar {
            background-color: #023e8A;
            padding: 1rem 2rem;
        }
        .navContainer {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* pill menu */
        .switchMenu {
            position: relative;
            display: flex;
            background-color: rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 5px;
            width: 240px;
            cursor: pointer;
        }
        .switchOption {
            flex: 1;
            text-align: center;
            padding: 10px 20px;
            color: white;
            z-index: 1;
            position: relative;
            cursor: pointer;
        }
        .switchSlider {
            position: absolute;
            top: 5px;
            left: 5px;
            width: calc(50% - 5px);
            height: calc(100% - 10px);
            background-color: white;
            border-radius: 30px;
            transition: transform 0.3s ease;
            pointer-events: none;
        }
        .switchMenu.option2 .switchSlider {
            transform: translateX(calc(100% + 0px));
        }
        .backLink {
            color: white;
            text-decoration: none;
        }
        /* 3 column layout */
        .dashboardContainer {
            display: flex;
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
            gap: 20px;
        }
        /* column widths */
        .leftColumn, .rightColumn {
            width: 250px;
        }
        .middleColumn {
            flex: 1;
        }
        /* box styles - minimal borders */
        .leftColumn, .middleColumn, .rightColumn {
            background: white;
            border: 1px solid #ccc;
            padding: 15px;
        }
        .topicItem, .strengthItem, .weaknessItem, .statsCard {
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 5px;
            background: #f8f8f8;
            cursor: pointer;
        }
        .topicItem.allTopics {
            background: #e0e0e0;
            font-weight: bold;
        }
        .statRow {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ccc;
        }
        .statRow:last-child {
            border-bottom: none;
        }
        .statValue.large {
            font-size: 32px;
        }
        .noData {
            padding: 10px;
            text-align: center;
            color: #666;
            border: 1px solid #ccc;
            background: #f8f8f8;
        }
        h3 {
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <!-- Navbar from main.html -->
    <nav class="navbar">
        <div class="navContainer">
            <div class="switchMenu">
                <div class="switchOption" data-option="option1">Study Now</div>
                <div class="switchOption active" data-option="option2">View Analytics</div>
                <div class="switchSlider"></div>
            </div>
            <a href="main.html" class="backLink">← Back to Topics</a>
        </div>
    </nav>

    <!-- Main 3-column dashboard -->
    <div class="dashboardContainer">
        <!-- LEFT COLUMN - Topics List -->
        <div class="leftColumn">
            <h3>TOPICS</h3>
            <div class="topicsList" id="topicsList">
                <div class="topicItem allTopics" id="allTopicsBtn">All Topics</div>
                <!-- Other topics will be loaded here -->
            </div>
        </div>

        <!-- MIDDLE COLUMN - Stats -->
        <div class="middleColumn">
            <h2 style="border-bottom: 1px solid #ccc; padding-bottom: 5px;" id="statsHeader">Overall Performance</h2>
            
            <!-- Overall Stats -->
            <div id="overallStats">
                <div class="statsCard">
                    <div class="statRow">
                        <span>Total Accuracy:</span>
                        <span class="statValue large" id="overallAccuracy">0%</span>
                    </div>
                    <div class="statRow">
                        <span>Total Questions:</span>
                        <span class="statValue" id="totalQuestions">0</span>
                    </div>
                    <div class="statRow">
                        <span>Correct Answers:</span>
                        <span class="statValue" id="totalCorrect">0</span>
                    </div>
                    <div class="statRow">
                        <span>Incorrect Answers:</span>
                        <span class="statValue" id="totalIncorrect">0</span>
                    </div>
                </div>
            </div>

            <!-- Topic Stats (hidden by default) -->
            <div id="topicStats" style="display: none;">
                <div class="statsCard">
                    <div class="statRow">
                        <span>Topic Accuracy:</span>
                        <span class="statValue large" id="topicAccuracy">0%</span>
                    </div>
                    <div class="statRow">
                        <span>Questions Attempted:</span>
                        <span class="statValue" id="topicAttempted">0</span>
                    </div>
                    <div class="statRow">
                        <span>Correct:</span>
                        <span class="statValue" id="topicCorrect">0</span>
                    </div>
                    <div class="statRow">
                        <span>Incorrect:</span>
                        <span class="statValue" id="topicIncorrect">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN - Strengths & Weaknesses -->
        <div class="rightColumn">
            <div>
                <h3>STRENGTHS</h3>
                <div id="strengthsList">
                    <div class="noData">Loading strengths...</div>
                </div>
            </div>
            
            <div style="margin-top: 25px;">
                <h3>WEAKNESSES</h3>
                <div id="weaknessesList">
                    <div class="noData">Loading weaknesses...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase connection
        const supabaseClient = supabase.createClient(
            'https://pxjndwrkafegopsolnde.supabase.co',
            'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
        );

        const student_id = 'StudentTest';
        let allTopics = [];
        let allPerformances = [];
        let strengthsList = [];
        let weaknessesList = [];

        // Load everything when page opens
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('Page loaded, fetching data...');
            await loadData();
            setupNavbar();
            setupAllTopicsButton();
        });

        async function loadData() {
            // Get all topics
            const { data: topics } = await supabaseClient
                .from('topics')
                .select('*');
            
            // Get performance data for this student
            const { data: performances } = await supabaseClient
                .from('topic_performance')
                .select('*')
                .eq('student_id', student_id);

            // Get strengths
            const { data: strengths } = await supabaseClient
                .from('strengths')
                .select('topic_id')
                .eq('student_id', student_id);

            // Get weaknesses
            const { data: weaknesses } = await supabaseClient
                .from('weaknesses')
                .select('topic_id')
                .eq('student_id', student_id);

            allTopics = topics || [];
            allPerformances = performances || [];
            strengthsList = strengths || [];
            weaknessesList = weaknesses || [];

            // Display everything
            displayTopicsList(allTopics);
            calculateOverallStats(allPerformances);
            displayStrengthsWeaknesses();
        }

        function displayTopicsList(topics) {
            const topicsDiv = document.getElementById('topicsList');
            
            topics.forEach(topic => {
                const topicDiv = document.createElement('div');
                topicDiv.className = 'topicItem';
                topicDiv.textContent = topic.topic_name;
                topicDiv.onclick = function() {
                    showTopicStats(topic);
                };
                topicsDiv.appendChild(topicDiv);
            });
        }

        function calculateOverallStats(performances) {
            let totalQuestions = 0;
            let totalCorrect = 0;
            
            performances.forEach(p => {
                totalQuestions += p.questions_attempted || 0;
                totalCorrect += p.questions_correct || 0;
            });
            
            const totalIncorrect = totalQuestions - totalCorrect;
            const overallAccuracy = totalQuestions > 0 
                ? Math.round((totalCorrect / totalQuestions) * 100) 
                : 0;
            
            document.getElementById('overallAccuracy').textContent = overallAccuracy + '%';
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('totalCorrect').textContent = totalCorrect;
            document.getElementById('totalIncorrect').textContent = totalIncorrect;
        }

        function setupAllTopicsButton() {
            document.getElementById('allTopicsBtn').onclick = function() {
                showOverallStats();
            };
        }

        function showOverallStats() {
            document.getElementById('statsHeader').textContent = 'Overall Performance';
            document.getElementById('overallStats').style.display = 'block';
            document.getElementById('topicStats').style.display = 'none';
        }

        function showTopicStats(topic) {
            const performance = allPerformances.find(p => p.topic_id === topic.topic_id) || {
                questions_attempted: 0,
                questions_correct: 0,
                accuracy_percent: 0
            };
            
            const attempted = performance.questions_attempted || 0;
            const correct = performance.questions_correct || 0;
            const incorrect = attempted - correct;
            const accuracy = performance.accuracy_percent || 0;
            
            document.getElementById('statsHeader').textContent = topic.topic_name;
            document.getElementById('topicAccuracy').textContent = Math.round(accuracy) + '%';
            document.getElementById('topicAttempted').textContent = attempted;
            document.getElementById('topicCorrect').textContent = correct;
            document.getElementById('topicIncorrect').textContent = incorrect;
            
            document.getElementById('overallStats').style.display = 'none';
            document.getElementById('topicStats').style.display = 'block';
        }

        function displayStrengthsWeaknesses() {
            const strengthsDiv = document.getElementById('strengthsList');
            const weaknessesDiv = document.getElementById('weaknessesList');
            
            const strengthMap = new Map(strengthsList.map(s => [s.topic_id, true]));
            const weaknessMap = new Map(weaknessesList.map(w => [w.topic_id, true]));
            
            // Strengths
            strengthsDiv.innerHTML = '';
            let hasStrengths = false;
            
            allTopics.forEach(topic => {
                if (strengthMap.has(topic.topic_id)) {
                    hasStrengths = true;
                    const perf = allPerformances.find(p => p.topic_id === topic.topic_id);
                    const accuracy = perf ? perf.accuracy_percent : 0;
                    
                    const item = document.createElement('div');
                    item.className = 'topicItem';
                    item.innerHTML = `${topic.topic_name} <span style="float:right;">${Math.round(accuracy)}%</span>`;
                    item.onclick = function() {
                        showTopicStats(topic);
                    };
                    strengthsDiv.appendChild(item);
                }
            });
            
            if (!hasStrengths) {
                strengthsDiv.innerHTML = '<div class="noData">No strengths yet</div>';
            }
            
            // Weaknesses
            weaknessesDiv.innerHTML = '';
            let hasWeaknesses = false;
            
            allTopics.forEach(topic => {
                if (weaknessMap.has(topic.topic_id)) {
                    hasWeaknesses = true;
                    const perf = allPerformances.find(p => p.topic_id === topic.topic_id);
                    const accuracy = perf ? perf.accuracy_percent : 0;
                    
                    const item = document.createElement('div');
                    item.className = 'topicItem';
                    item.innerHTML = `${topic.topic_name} <span style="float:right;">${Math.round(accuracy)}%</span>`;
                    item.onclick = function() {
                        showTopicStats(topic);
                    };
                    weaknessesDiv.appendChild(item);
                }
            });
            
            if (!hasWeaknesses) {
                weaknessesDiv.innerHTML = '<div class="noData">No weaknesses</div>';
            }
        }

        function setupNavbar() {
            const switchMenu = document.querySelector('.switchMenu');
            const switchOptions = document.querySelectorAll('.switchOption');

            switchOptions.forEach(option => {
                option.addEventListener('click', function() {
                    const selectedOption = this.dataset.option;
                    
                    switchOptions.forEach(opt => opt.classList.remove('active'));
                    this.classList.add('active');
                    
                    if (selectedOption === 'option2') {
                        switchMenu.classList.add('option2');
                    } else {
                        switchMenu.classList.remove('option2');
                        // Go to study.html when Study Now is clicked
                        window.location.href = 'study.html';
                    }
                });
            });
            
            // Make sure View Analytics is active
            switchMenu.classList.add('option2');
        }
    </script>
</body>
</html>
