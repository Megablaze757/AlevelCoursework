<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="margin: 0; font-family: Arial, sans-serif;">
    <!-- Main container with 3 columns -->
    <div style="display: flex; height: 100vh;">
        
        <!-- LEFT COLUMN - Topics List -->
        <div style="width: 200px; border-right: 1px solid #ccc; padding: 10px; overflow-y: auto;">
            <h3 style="margin-top: 0;">Topics</h3>
            <div id="topicsList">
                <!-- Topics will be loaded here -->
                <div>Loading topics...</div>
            </div>
        </div>

        <!-- MIDDLE COLUMN - Main Stats -->
        <div style="flex: 1; padding: 20px; overflow-y: auto;">
            <!-- Overall Stats -->
            <div id="overallStats" style="margin-bottom: 30px;">
                <h2>Overall Performance</h2>
                <div style="border: 1px solid #ccc; padding: 15px; border-radius: 5px;">
                    <div style="margin-bottom: 10px;">
                        <strong>Total Accuracy:</strong> 
                        <span id="overallAccuracy">0%</span>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <strong>Total Questions:</strong> 
                        <span id="totalQuestions">0</span>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <strong>Correct:</strong> 
                        <span id="totalCorrect">0</span>
                    </div>
                    <div>
                        <strong>Incorrect:</strong> 
                        <span id="totalIncorrect">0</span>
                    </div>
                </div>
            </div>

            <!-- Topic Stats (hidden initially) -->
            <div id="topicStats" style="display: none;">
                <h2 id="selectedTopicName">Topic Name</h2>
                <div style="border: 1px solid #ccc; padding: 15px; border-radius: 5px;">
                    <div style="margin-bottom: 10px;">
                        <strong>Topic Accuracy:</strong> 
                        <span id="topicAccuracy">0%</span>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <strong>Questions Attempted:</strong> 
                        <span id="topicAttempted">0</span>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <strong>Correct:</strong> 
                        <span id="topicCorrect">0</span>
                    </div>
                    <div>
                        <strong>Incorrect:</strong> 
                        <span id="topicIncorrect">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT COLUMN - Strengths & Weaknesses -->
        <div style="width: 200px; border-left: 1px solid #ccc; padding: 10px; overflow-y: auto;">
            <div style="margin-bottom: 20px;">
                <h3 style="margin-top: 0;">Strengths</h3>
                <div id="strengthsList">
                    <!-- Strengths will be loaded here -->
                    <div>Loading...</div>
                </div>
            </div>
            
            <div>
                <h3>Weaknesses</h3>
                <div id="weaknessesList">
                    <!-- Weaknesses will be loaded here -->
                    <div>Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Supabase connection
        const supabaseClient = supabase.createClient(
            'https://pxjndwrkafegopsolnde.supabase.co',
            'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
        );

        const student_id = 'StudentTest';
        let allTopics = [];
        let allPerformances = [];

        // Load everything when page opens
        document.addEventListener('DOMContentLoaded', async function() {
            await loadData();
        });

        async function loadData() {
            // Get all topics
            const { data: topics } = await supabaseClient
                .from('topics')
                .select('*');
            
            // Get performance data for this student
            const { data: performances } = await supabaseClient
                .from('topic_performance')
                .select('*')
                .eq('student_id', student_id);

            // Get strengths
            const { data: strengths } = await supabaseClient
                .from('strengths')
                .select('topic_id')
                .eq('student_id', student_id);

            // Get weaknesses
            const { data: weaknesses } = await supabaseClient
                .from('weaknesses')
                .select('topic_id')
                .eq('student_id', student_id);

            allTopics = topics || [];
            allPerformances = performances || [];

            // Display topics in left column
            displayTopicsList(topics || []);
            
            // Calculate and display overall stats
            calculateOverallStats(performances || []);
            
            // Display strengths and weaknesses
            displayStrengthsWeaknesses(topics || [], strengths || [], weaknesses || []);
        }

        function displayTopicsList(topics) {
            const topicsDiv = document.getElementById('topicsList');
            topicsDiv.innerHTML = '';
            
            // Add "All Topics" option first
            const allTopicsBtn = document.createElement('div');
            allTopicsBtn.innerHTML = '📊 All Topics';
            allTopicsBtn.style.padding = '8px';
            allTopicsBtn.style.marginBottom = '5px';
            allTopicsBtn.style.cursor = 'pointer';
            allTopicsBtn.style.backgroundColor = '#f0f0f0';
            allTopicsBtn.style.borderRadius = '3px';
            allTopicsBtn.onclick = function() {
                showOverallStats();
            };
            topicsDiv.appendChild(allTopicsBtn);
            
            // Add each topic
            topics.forEach(topic => {
                const topicDiv = document.createElement('div');
                topicDiv.innerHTML = `📚 ${topic.topic_name}`;
                topicDiv.style.padding = '8px';
                topicDiv.style.marginBottom = '5px';
                topicDiv.style.cursor = 'pointer';
                topicDiv.style.borderRadius = '3px';
                
                // Highlight on hover
                topicDiv.onmouseover = function() {
                    this.style.backgroundColor = '#e0e0e0';
                };
                topicDiv.onmouseout = function() {
                    this.style.backgroundColor = 'transparent';
                };
                
                // Show topic stats when clicked
                topicDiv.onclick = function() {
                    showTopicStats(topic);
                };
                
                topicsDiv.appendChild(topicDiv);
            });
        }

        function calculateOverallStats(performances) {
            let totalQuestions = 0;
            let totalCorrect = 0;
            
            performances.forEach(p => {
                totalQuestions += p.questions_attempted || 0;
                totalCorrect += p.questions_correct || 0;
            });
            
            const totalIncorrect = totalQuestions - totalCorrect;
            const overallAccuracy = totalQuestions > 0 
                ? Math.round((totalCorrect / totalQuestions) * 100) 
                : 0;
            
            // Update the display
            document.getElementById('overallAccuracy').textContent = overallAccuracy + '%';
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('totalCorrect').textContent = totalCorrect;
            document.getElementById('totalIncorrect').textContent = totalIncorrect;
        }

        function showOverallStats() {
            document.getElementById('overallStats').style.display = 'block';
            document.getElementById('topicStats').style.display = 'none';
        }

        function showTopicStats(topic) {
            // Find performance for this topic
            const performance = allPerformances.find(p => p.topic_id === topic.topic_id) || {
                questions_attempted: 0,
                questions_correct: 0,
                accuracy_percent: 0
            };
            
            const attempted = performance.questions_attempted || 0;
            const correct = performance.questions_correct || 0;
            const incorrect = attempted - correct;
            const accuracy = performance.accuracy_percent || 0;
            
            // Update topic stats display
            document.getElementById('selectedTopicName').textContent = topic.topic_name;
            document.getElementById('topicAccuracy').textContent = Math.round(accuracy) + '%';
            document.getElementById('topicAttempted').textContent = attempted;
            document.getElementById('topicCorrect').textContent = correct;
            document.getElementById('topicIncorrect').textContent = incorrect;
            
            // Show topic stats, hide overall stats
            document.getElementById('overallStats').style.display = 'none';
            document.getElementById('topicStats').style.display = 'block';
        }

        function displayStrengthsWeaknesses(topics, strengths, weaknesses) {
            const strengthsDiv = document.getElementById('strengthsList');
            const weaknessesDiv = document.getElementById('weaknessesList');
            
            // Create a map for quick lookup
            const strengthMap = new Map();
            strengths.forEach(s => strengthMap.set(s.topic_id, true));
            
            const weaknessMap = new Map();
            weaknesses.forEach(w => weaknessMap.set(w.topic_id, true));
            
            // Clear and populate strengths
            strengthsDiv.innerHTML = '';
            let hasStrengths = false;
            
            topics.forEach(topic => {
                if (strengthMap.has(topic.topic_id)) {
                    hasStrengths = true;
                    const perf = allPerformances.find(p => p.topic_id === topic.topic_id);
                    const accuracy = perf ? perf.accuracy_percent : 0;
                    
                    const item = document.createElement('div');
                    item.style.padding = '8px';
                    item.style.marginBottom = '5px';
                    item.style.backgroundColor = '#e8f5e9';
                    item.style.borderRadius = '3px';
                    item.style.cursor = 'pointer';
                    item.innerHTML = `${topic.topic_name}<br><small>${Math.round(accuracy)}%</small>`;
                    
                    // Click to show this topic's stats
                    item.onclick = function() {
                        showTopicStats(topic);
                    };
                    
                    strengthsDiv.appendChild(item);
                }
            });
            
            if (!hasStrengths) {
                strengthsDiv.innerHTML = '<div style="color: #666;">No strengths yet</div>';
            }
            
            // Clear and populate weaknesses
            weaknessesDiv.innerHTML = '';
            let hasWeaknesses = false;
            
            topics.forEach(topic => {
                if (weaknessMap.has(topic.topic_id)) {
                    hasWeaknesses = true;
                    const perf = allPerformances.find(p => p.topic_id === topic.topic_id);
                    const accuracy = perf ? perf.accuracy_percent : 0;
                    
                    const item = document.createElement('div');
                    item.style.padding = '8px';
                    item.style.marginBottom = '5px';
                    item.style.backgroundColor = '#ffebee';
                    item.style.borderRadius = '3px';
                    item.style.cursor = 'pointer';
                    item.innerHTML = `${topic.topic_name}<br><small>${Math.round(accuracy)}%</small>`;
                    
                    // Click to show this topic's stats
                    item.onclick = function() {
                        showTopicStats(topic);
                    };
                    
                    weaknessesDiv.appendChild(item);
                }
            });
            
            if (!hasWeaknesses) {
                weaknessesDiv.innerHTML = '<div style="color: #666;">No weaknesses</div>';
            }
        }
    </script>
</body>
</html>
