<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .statsContainer {
            margin-top:50px;
            display:flex;
            justify-content: center;
            align-items: center;
        }
        .statsBox {
            width: 600px;
            border: 2px solid black;
            padding: 20px;
            background: white;
        }
        .backButton {
            margin-bottom: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>    
    <!--Topic stats display -->
    <div class='statsContainer'>
        <div class='statsBox'>
            <button class='backButton' id='backToHome'>← Back to Home</button>
            <h2 id="topicName">Overall Performance</h2>
            <div style="margin-top: 20px;">
                <div>
                    Total Accuracy:
                    <span id="accuracy">0%</span>
                </div>   
                <div>
                    Total Questions
                    <span id="totalQuestions">0</span>
                </div>   
                <div>
                    Correct Answers
                    <span id="correct">0</span>
                </div>   
                <div>
                    Incorrect Answers
                    <span id="incorrect">0</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class='strengthsContainer'>
        <div class='strengthsBox'>
            <h2>Strengths</h2>
            <div id='strengthsList'></div> 
        </div>    
    </div>
    
    <div class='weaknessContainer'>
        <div class='weaknessesBox'>
            <h2>Weaknesses</h2>
            <div id='weaknessesList'></div> 
        </div>    
    </div>
    <div class='topicsContainer'>
        <div class='topicsBox'>
            <h2>All topics</h2>
            <div id='topicsList'></div>
        </div>
    </div>
    <div class='styleContainer'>
    <div class='styleBox'>
        <h2>Select Your Learning Style</h2>
        <div class='radioGroup'>
            <div>
                <input type='radio' id='styleFill' name='learningStyle' value='fill in the blank'>
                <label for='styleFill'>Fill in the Blanks</label>
            </div>
            <div>
                <input type='radio' id='styleMultiple' name='learningStyle' value='multiple choice'>
                <label for='styleMultiple'>Multiple Choice</label>
            </div>
            <div>
                <input type='radio' id='styleExplanation' name='learningStyle' value='long explanation'>
                <label for='styleExplanation'>Long Explanation</label>
            </div>
        </div>
        <button id='confirmStyleBtn' class='confirmButton'>Confirm Learning Style</button>
        <div id='styleMessage' class='styleMessage'></div>
    </div>
    </div>

        async function loadOverallStats() {
            const{data: scores} = await supabaseClient
                .from('topic_performance')
                .select('*')
                .eq('student_id', studentId);
            console.log(scores);
            const performance = scores;

            let totalQuestions = 0;
            let totalCorrect = 0;
            console.log(performance)

            performance.forEach( p => {
                totalQuestions += p.questions_attempted || 0;
                totalCorrect += p.questions_correct || 0;                
            });
            
            const totalIncorrect = totalQuestions - totalCorrect;
            const totalAccuracy = totalQuestions > 0 ? Math.round((totalCorrect/totalQuestions) * 100) : 0;
            console.log('total Questions ', totalQuestions);
            console.log('total correct ', totalCorrect)
            console.log('total incorrect ', totalIncorrect)
            console.log('total accuracy ', totalAccuracy)

            document.getElementById('accuracy').textContent = totalAccuracy + '%';
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('correct').textContent = totalCorrect;
            document.getElementById('incorrect').textContent = totalIncorrect;
            document.getElementById('topicName').textContent = 'Overall Performance';
        };

        async function loadStrengths() {
            const strengthsList = document.getElementById('strengthsList');
            strengthsList.innerHTML = '';
            
            const{data: strengths, error} = await supabaseClient
                .from('strengths')
                .select('topics(topic_name)')
                .eq('student_id', studentId);
            
            strengths.forEach ( s => {
                const div = document.createElement('div');
                div.className = 'strengthItem';
                div.textContent = s.topics.topic_name;
                strengthsList.appendChild(div);
            });
        }
        
        async function loadWeaknesses() {
            const weaknessesList = document.getElementById('weaknessesList');
            weaknessesList.innerHTML = '';
            
            const{data: weaknesses, error} = await supabaseClient
                .from('weaknesses')
                .select('topics(topic_name)')
                .eq('student_id', studentId);
            
            weaknesses.forEach ( w => {
                const div = document.createElement('div');
                div.className = 'weaknessItem';
                div.textContent = w.topics.topic_name;
                weaknessesList.appendChild(div);
            });
        }
        
        async function loadTopicStats(topicId, topicName){
            document.getElementById('topicName').textContent = topicName;
  
            const {data: topicPerf} = await supabaseClient
                .from('topic_performance')
                .select('*')
                .eq('student_id', studentId)
                .eq('topic_id', topicId);
            
            if (topicPerf && topicPerf.length > 0) {
                const attempted = topicPerf[0].questions_attempted || 0;
                const correct = topicPerf[0].questions_correct || 0;
                const incorrect = attempted - correct;
                const accuracy = attempted > 0 ? Math.round((correct/attempted) * 100) : 0;
                
                document.getElementById('accuracy').textContent = accuracy + '%';
                document.getElementById('totalQuestions').textContent = attempted;
                document.getElementById('correct').textContent = correct;
                document.getElementById('incorrect').textContent = incorrect;
            } else {
                document.getElementById('accuracy').textContent = '0%';
                document.getElementById('totalQuestions').textContent = '0';
                document.getElementById('correct').textContent = '0';
                document.getElementById('incorrect').textContent = '0';
            }
        }
        
        async function loadTopic(){
            const topicsList = document.getElementById('topicsList');
            
            const{data:topics, error} = await supabaseClient
                .from('topics')
                .select('topic_name, topic_id');
            
            topicsList.innerHTML = '';
            
            topics.forEach(topic => {
                const button = document.createElement('button');
                button.className = 'topicButton';
                button.textContent = topic.topic_name;
                button.setAttribute('data-topic-id', topic.topic_id);
                topicsList.appendChild(button);

                button.addEventListener('click', function() {
                    loadTopicStats(topic.topic_id, topic.topic_name);
                });
            });
        }

        document.getElementById('confirmStyleButton').addEventListener('click', updateCurrentStyle());
        
        document.getElementById('backToHome').addEventListener('click', function() {
            window.location.href = 'main.html';
        });
            
        document.addEventListener('DOMContentLoaded', function() {
            loadOverallStats();

        });
    </script>
</body> 
</html>
