<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Remove browser defaults */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        /* White background with subtle gradient */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        /* Main container */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Stats Container */
        .statsContainer {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .statsBox {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Back button */
        .backButton {
            background: white;
            border: 2px solid #e2e8f0;
            color: #4a5568;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            display: inline-block;
            font-size: 1rem;
        }

        .backButton:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.2);
        }

        .backButton:active {
            transform: translateY(0);
        }

        /* Headers */
        h2 {
            color: #2d3748;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 25px;
            background: #f8fafc;
            padding: 20px 30px;
            border-radius: 50px;
            display: inline-block;
            border-left: 4px solid #667eea;
            border: 1px solid #e2e8f0;
        }

        /* Stats grid inside statsBox */
        .statsBox > div {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .statsBox > div > div {
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
            transition: transform 0.3s ease;
        }

        .statsBox > div > div:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .statsBox span {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            margin-top: 10px;
        }

        #accuracy {
            color: #48bb78;
        }

        #totalQuestions {
            color: #4299e1;
        }

        #correct {
            color: #38a169;
        }

        #incorrect {
            color: #f56565;
        }

        /* Three column layout for strengths, weaknesses, topics */
        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 25px;
        }

        /* Containers */
        .strengthsContainer, .weaknessContainer, .topicsContainer {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .strengthsBox, .weaknessesBox, .topicsBox {
            height: 100%;
        }

        /* Section titles */
        .strengthsContainer h2, .weaknessContainer h2, .topicsContainer h2 {
            font-size: 1.4rem;
            padding: 15px 25px;
            margin-bottom: 20px;
            width: 100%;
        }

        /* Topics list */
        .topicsBox {
            display: flex;
            flex-direction: column;
        }

        #topicsList {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Topic buttons */
        .topicButton {
            width: 100%;
            padding: 15px 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: #2d3748;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .topicButton:hover {
            border-color: #667eea;
            background: white;
            transform: translateX(5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .topicButton:active {
            transform: translateX(2px);
        }

        /* Strength items */
        .strengthItem {
            padding: 15px 20px;
            margin-bottom: 10px;
            background: #f0fff4;
            color: #276749;
            border-left: 4px solid #48bb78;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid #c6f6d5;
            animation: slideIn 0.3s ease;
        }

        /* Weakness items */
        .weaknessItem {
            padding: 15px 20px;
            margin-bottom: 10px;
            background: #fff5f5;
            color: #c53030;
            border-left: 4px solid #f56565;
            border-radius: 50px;
            font-weight: 600;
            border: 1px solid #fed7d7;
            animation: slideIn 0.3s ease;
        }

        /* Style Container - Learning Style Selection */
        .styleContainer {
            margin-top: 25px;
        }

        .styleBox {
            background: white;
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .styleBox h2 {
            margin-bottom: 30px;
        }

        .radioGroup {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .radioGroup > div {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .radioGroup > div:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.15);
        }

        .radioGroup input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #cbd5e0;
            border-radius: 50%;
            margin-right: 10px;
            position: relative;
            cursor: pointer;
            vertical-align: middle;
        }

        .radioGroup input[type="radio"]:checked {
            border-color: #667eea;
            background: #667eea;
            box-shadow: inset 0 0 0 4px white;
        }

        .radioGroup label {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d3748;
            cursor: pointer;
        }

        /* Confirm button */
        .confirmButton {
            background: #667eea;
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 20px 0;
            box-shadow: 0 4px 6px rgba(102, 126, 234, 0.25);
        }

        .confirmButton:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(102, 126, 234, 0.3);
        }

        .confirmButton:active {
            transform: scale(0.98);
        }

        /* Style message */
        .styleMessage {
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 20px;
            animation: slideIn 0.3s ease;
        }

        .styleMessage:not(:empty) {
            background: #f0fff4;
            color: #276749;
            border-left: 4px solid #48bb78;
            border: 1px solid #c6f6d5;
        }

        /* Animation */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Custom scrollbar */
        #topicsList::-webkit-scrollbar {
            width: 8px;
        }

        #topicsList::-webkit-scrollbar-track {
            background: #edf2f7;
            border-radius: 10px;
        }

        #topicsList::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        #topicsList::-webkit-scrollbar-thumb:hover {
            background: #5a67d8;
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .analysis-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .topicsContainer {
                grid-column: span 2;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }

            .statsBox {
                padding: 25px;
            }

            .statsBox > div {
                grid-template-columns: 1fr 1fr;
            }

            h2 {
                font-size: 1.5rem;
                padding: 15px 25px;
            }

            .analysis-grid {
                grid-template-columns: 1fr;
            }
            
            .topicsContainer {
                grid-column: span 1;
            }

            .radioGroup {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .statsBox > div {
                grid-template-columns: 1fr;
            }

            .backButton {
                width: 100%;
                text-align: center;
            }

            .confirmButton {
                width: 100%;
            }
        }

        /* Empty state styling */
        #strengthsList:empty::before,
        #weaknessesList:empty::before {
            content: 'No items to display';
            display: block;
            padding: 20px;
            text-align: center;
            color: #a0aec0;
            font-style: italic;
            background: #f8fafc;
            border-radius: 50px;
            border: 1px dashed #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!--Topic stats display -->
        <div class='statsContainer'>
            <div class='statsBox'>
                <button class='backButton' id='backToHome'>← Back to Home</button>
                <h2 id="topicName">Overall Performance</h2>
                <div>
                    <div>
                        Total Accuracy:
                        <span id="accuracy">0%</span>
                    </div>   
                    <div>
                        Total Questions
                        <span id="totalQuestions">0</span>
                    </div>   
                    <div>
                        Correct Answers
                        <span id="correct">0</span>
                    </div>   
                    <div>
                        Incorrect Answers
                        <span id="incorrect">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Three column layout -->
        <div class="analysis-grid">
            <div class='strengthsContainer'>
                <div class='strengthsBox'>
                    <h2>✨ Strengths</h2>
                    <div id='strengthsList'></div> 
                </div>    
            </div>
            
            <div class='weaknessContainer'>
                <div class='weaknessesBox'>
                    <h2>🎯 Weaknesses</h2>
                    <div id='weaknessesList'></div> 
                </div>    
            </div>

            <div class='topicsContainer'>
                <div class='topicsBox'>
                    <h2>📋 All Topics</h2>
                    <div id='topicsList'></div>
                </div>
            </div>
        </div>

        <!-- Learning Style Container -->
        <div class='styleContainer'>
            <div class='styleBox'>
                <h2>Select Your Learning Style</h2>
                <div class='radioGroup'>
                    <div>
                        <input type='radio' id='styleFill' name='learningStyle' value='fill in the blank'>
                        <label for='styleFill'>Fill in the Blanks</label>
                    </div>
                    <div>
                        <input type='radio' id='styleMultiple' name='learningStyle' value='multiple choice'>
                        <label for='styleMultiple'>Multiple Choice</label>
                    </div>
                    <div>
                        <input type='radio' id='styleExplanation' name='learningStyle' value='long explanation'>
                        <label for='styleExplanation'>Long Explanation</label>
                    </div>
                </div>
                <button id='confirmStyleBtn' class='confirmButton'>Confirm Learning Style</button>
                <div id='styleMessage' class='styleMessage'></div>
            </div>
        </div>
    </div>

    <script>    
        const supabase_url = 'https://pxjndwrkafegopsolnde.supabase.co'
        const supabase_key = 'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
        const supabaseClient = supabase.createClient(
            'https://pxjndwrkafegopsolnde.supabase.co',
            'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
        );
        
        // Check if user is logged in redirect to index.html if not
        const username = sessionStorage.getItem('username');
        if (!username) {
            window.location.href = 'index.html';

            throw new Error('No username found, redirecting to login');
        }
        
   
        let studentId = username;

        console.log('Current student:', studentId);

        async function loadOverallStats() {
            const{data: scores} = await supabaseClient
                .from('topic_performance')
                .select('*')
                .eq('student_id', studentId);
            console.log(scores);
            const performance = scores;

            let totalQuestions = 0;
            let totalCorrect = 0;
            console.log(performance)

            performance.forEach( p => {
                totalQuestions += p.questions_attempted || 0;
                totalCorrect += p.questions_correct || 0;                
            });
            
            const totalIncorrect = totalQuestions - totalCorrect;
            const totalAccuracy = totalQuestions > 0 ? Math.round((totalCorrect/totalQuestions) * 100) : 0;
            console.log('total Questions ', totalQuestions);
            console.log('total correct ', totalCorrect)
            console.log('total incorrect ', totalIncorrect)
            console.log('total accuracy ', totalAccuracy)

            document.getElementById('accuracy').textContent = totalAccuracy + '%';
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('correct').textContent = totalCorrect;
            document.getElementById('incorrect').textContent = totalIncorrect;
            document.getElementById('topicName').textContent = 'Overall Performance';
        };

        async function loadStrengths() {
            const strengthsList = document.getElementById('strengthsList');
            strengthsList.innerHTML = '';
            
            const{data: strengths, error} = await supabaseClient
                .from('strengths')
                .select('topics(topic_name)')
                .eq('student_id', studentId);
            
            if (strengths && strengths.length > 0) {
                strengths.forEach ( s => {
                    const div = document.createElement('div');
                    div.className = 'strengthItem';
                    div.textContent = '✨ ' + s.topics.topic_name;
                    strengthsList.appendChild(div);
                });
            }
        }
        
        async function loadWeaknesses() {
            const weaknessesList = document.getElementById('weaknessesList');
            weaknessesList.innerHTML = '';
            
            const{data: weaknesses, error} = await supabaseClient
                .from('weaknesses')
                .select('topics(topic_name)')
                .eq('student_id', studentId);
            
            if (weaknesses && weaknesses.length > 0) {
                weaknesses.forEach ( w => {
                    const div = document.createElement('div');
                    div.className = 'weaknessItem';
                    div.textContent = '📚 ' + w.topics.topic_name;
                    weaknessesList.appendChild(div);
                });
            }
        }
        
        async function loadTopicStats(topicId, topicName){
            document.getElementById('topicName').textContent = topicName;
  
            const {data: topicPerf} = await supabaseClient
                .from('topic_performance')
                .select('*')
                .eq('student_id', studentId)
                .eq('topic_id', topicId);
            
            if (topicPerf && topicPerf.length > 0) {
                const attempted = topicPerf[0].questions_attempted || 0;
                const correct = topicPerf[0].questions_correct || 0;
                const incorrect = attempted - correct;
                const accuracy = attempted > 0 ? Math.round((correct/attempted) * 100) : 0;
                
                document.getElementById('accuracy').textContent = accuracy + '%';
                document.getElementById('totalQuestions').textContent = attempted;
                document.getElementById('correct').textContent = correct;
                document.getElementById('incorrect').textContent = incorrect;
            } else {
                document.getElementById('accuracy').textContent = '0%';
                document.getElementById('totalQuestions').textContent = '0';
                document.getElementById('correct').textContent = '0';
                document.getElementById('incorrect').textContent = '0';
            }
        }
        
        async function loadTopic(){
            const topicsList = document.getElementById('topicsList');
            
            const{data:topics, error} = await supabaseClient
                .from('topics')
                .select('topic_name, topic_id');
            
            topicsList.innerHTML = '';
            
            if (topics && topics.length > 0) {
                topics.forEach(topic => {
                    const button = document.createElement('button');
                    button.className = 'topicButton';
                    button.textContent = topic.topic_name;
                    button.setAttribute('data-topic-id', topic.topic_id);
                    topicsList.appendChild(button);

                    button.addEventListener('click', function() {
                        loadTopicStats(topic.topic_id, topic.topic_name);
                    });
                });
            }
        }
        
        async function updateCurrentStyle() {
            const selectedStyle = document.querySelector('input[name="learningStyle"]:checked');
            if (!selectedStyle) {
                document.getElementById('styleMessage').textContent = 'Please select a learning style';
                return;
            }
            
            const styleValue = selectedStyle.value;
            
            // Check if record exists
            const { data: existing } = await supabaseClient
                .from('adaptive_settings')
                .select('student_id')
                .eq('student_id', studentId);
            
            if (existing && existing.length > 0) {
                // Update existing record
                const { error } = await supabaseClient
                    .from('adaptive_settings')
                    .update({ 
                        preferred_style: styleValue,
                        difficulty_adjustment: 0 
                    })
                    .eq('student_id', studentId);
                    
                if (!error) {
                    document.getElementById('styleMessage').textContent = 'Learning style updated successfully!';
                }
            } else {
                // Insert new record
                const { error } = await supabaseClient
                    .from('adaptive_settings')
                    .insert({ 
                        student_id: studentId,
                        preferred_style: styleValue,
                        difficulty_adjustment: 0 
                    });
                    
                if (!error) {
                    document.getElementById('styleMessage').textContent = 'Learning style saved successfully!';
                }
            }
        }
        
        document.getElementById('confirmStyleBtn').addEventListener('click', updateCurrentStyle);
        
        document.getElementById('backToHome').addEventListener('click', function() {
            window.location.href = 'main.html';
        });
            
        document.addEventListener('DOMContentLoaded', function() {
            loadOverallStats(); 
            loadStrengths();
            loadWeaknesses();
            loadTopic();
        });
    </script>
</body> 
</html>
