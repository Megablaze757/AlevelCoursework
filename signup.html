<!DOCTYPE html>
<html>
  <head>
    <title>Sign Up - Revision App</title>
    <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
    <style>
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      }

      body {
          background: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
      }

      .container {
          width: 100%;
          max-width: 550px;
          margin: 0 auto;
      }

      .signupForm {
          background: white;
          border-radius: 30px;
          padding: 45px 40px;
          box-shadow: 0 20px 60px rgba(0,0,0,0.08);
          border: 1px solid #f0f0f0;
          transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .signupForm:hover {
          transform: translateY(-5px);
          box-shadow: 0 30px 80px rgba(102, 126, 234, 0.12);
      }

      .signupForm h2 {
          color: #2d3748;
          font-size: 2.2rem;
          font-weight: 700;
          margin-bottom: 35px;
          text-align: center;
          background: #f8fafc;
          padding: 20px 30px;
          border-radius: 50px;
          display: inline-block;
          width: 100%;
          border-left: 4px solid #667eea;
          border: 1px solid #e2e8f0;
      }

      .signupForm label {
          display: block;
          margin-bottom: 8px;
          font-weight: 600;
          color: #4a5568;
          font-size: 0.95rem;
          text-transform: uppercase;
          letter-spacing: 0.5px;
          margin-left: 5px;
      }

      .signupForm input[type="text"],
      .signupForm input[type="password"],
      .signupForm select {
          width: 100%;
          padding: 15px 20px;
          border: 2px solid #e2e8f0;
          border-radius: 50px;
          font-size: 1rem;
          color: #2d3748;
          background: white;
          transition: all 0.3s ease;
          margin-bottom: 20px;
      }

      .signupForm input:hover,
      .signupForm select:hover {
          border-color: #667eea;
      }

      .signupForm input:focus,
      .signupForm select:focus {
          outline: none;
          border-color: #667eea;
          box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .signupForm select:disabled {
          background: #f7fafc;
          cursor: not-allowed;
          opacity: 0.7;
      }

      .checkbox-container {
          display: flex;
          align-items: center;
          gap: 12px;
          margin: 25px 0;
          padding: 15px 20px;
          background: #f8fafc;
          border-radius: 50px;
          border: 1px solid #e2e8f0;
      }

      .checkbox-container label {
          margin: 0;
          text-transform: none;
          font-size: 1rem;
          color: #2d3748;
      }

      .checkbox-container input[type="checkbox"] {
          width: 20px;
          height: 20px;
          cursor: pointer;
          accent-color: #667eea;
      }

      .schoolSection,
      .classSection {
          margin: 25px 0;
          padding: 20px;
          background: #f8fafc;
          border-radius: 30px;
          border: 1px solid #e2e8f0;
      }

      #newSchoolContainer,
      #newClassContainer {
          margin-top: 20px;
          padding: 20px;
          background: white;
          border-radius: 25px;
          border: 2px dashed #667eea;
          animation: slideDown 0.3s ease;
      }

      @keyframes slideDown {
          from {
              opacity: 0;
              transform: translateY(-10px);
          }
          to {
              opacity: 1;
              transform: translateY(0);
          }
      }

      .small-btn {
          padding: 12px 25px;
          border: none;
          border-radius: 50px;
          font-size: 0.9rem;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.3s ease;
          background: white;
          color: #4a5568;
          border: 2px solid #667eea;
          margin-top: 10px;
          width: auto;
          display: inline-block;
      }

      .small-btn:hover {
          background: #667eea;
          color: white;
          transform: translateY(-2px);
          box-shadow: 0 6px 12px rgba(102, 126, 234, 0.2);
      }

      .small-btn:active {
          transform: scale(0.98);
      }

      .submit-btn {
          width: 100%;
          padding: 18px 30px;
          border: none;
          border-radius: 50px;
          font-size: 1.1rem;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.3s ease;
          background: #667eea;
          color: white;
          box-shadow: 0 4px 6px rgba(0,0,0,0.05);
          margin: 25px 0 15px 0;
          text-transform: uppercase;
          letter-spacing: 1px;
      }

      .submit-btn:hover {
          background: #5a67d8;
          transform: translateY(-2px);
          box-shadow: 0 6px 12px rgba(102, 126, 234, 0.2);
      }

      .submit-btn:active {
          transform: scale(0.98);
      }

      .statusMessage {
          padding: 15px 25px;
          border-radius: 50px;
          margin: 15px 0;
          font-weight: 600;
          animation: slideIn 0.3s ease;
          text-align: center;
          background: #f8fafc;
          color: #4a5568;
          border: 1px solid #e2e8f0;
          min-height: 60px;
          display: flex;
          align-items: center;
          justify-content: center;
      }

      .statusMessage:not(:empty) {
          background: #f0fff4;
          color: #276749;
          border-left: 4px solid #48bb78;
          border: 1px solid #c6f6d5;
      }

      .statusMessage.error {
          background: #fff5f5;
          color: #c53030;
          border-left: 4px solid #f56565;
          border: 1px solid #fed7d7;
      }

      .login-link {
          text-align: center;
          margin-top: 20px;
          padding-top: 20px;
          border-top: 2px solid #f0f0f0;
          color: #4a5568;
          font-size: 0.95rem;
      }

      .login-link a {
          color: #667eea;
          text-decoration: none;
          font-weight: 600;
          transition: color 0.3s ease;
      }

      .login-link a:hover {
          color: #5a67d8;
          text-decoration: underline;
      }

      .signupForm input::placeholder,
      .signupForm select::placeholder {
          color: #a0aec0;
          opacity: 0.7;
      }

      @keyframes slideIn {
          from {
              opacity: 0;
              transform: translateY(-10px);
          }
          to {
              opacity: 1;
              transform: translateY(0);
          }
      }

      @media (max-width: 600px) {
          .signupForm {
              padding: 30px 20px;
          }
          
          .signupForm h2 {
              font-size: 1.8rem;
              padding: 15px 20px;
          }
          
          .container {
              max-width: 100%;
          }
          
          .checkbox-container {
              flex-direction: column;
              text-align: center;
          }
      }

      body::before {
          content: '';
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: radial-gradient(circle at 20% 20%, rgba(102, 126, 234, 0.03) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(102, 126, 234, 0.03) 0%, transparent 50%);
          pointer-events: none;
      }

      .submit-btn:focus-visible,
      .small-btn:focus-visible,
      .signupForm input:focus-visible,
      .signupForm select:focus-visible {
          outline: 2px solid #667eea;
          outline-offset: 2px;
      }

      select {
          appearance: none;
          background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a5568' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
          background-repeat: no-repeat;
          background-position: right 15px center;
          background-size: 15px;
      }

      select::-ms-expand {
          display: none;
      }
    </style>
  </head>
  
  <body>
    <div class="container">
      <div class='signupForm'>
        <h2>Create an Account</h2>
        
        <label for='Username'>Username</label>
        <input type='text' id='Username' username=username placeholder="Enter username">
        
        <label for='Password'>Password</label>
        <input type='password' id='Password' password=password placeholder="Enter password (min. 8 characters)">
        
        <label for='Name'>Full Name</label>
        <input type='text' id='Name' name=name placeholder="Enter your full name">
        
        <div class="checkbox-container">
          <input type="checkbox" class='isTeacher' id='isTeacher'>
          <label for='isTeacher'>Are you a Teacher?</label> 
        </div>
        
        <div class='schoolSection'>
          <label for='schoolSelect'>Select School</label>
          <select id="schoolSelect">
            <option value="">Loading schools...</option>
          </select>
          <div id='newSchoolContainer' style='display:none;'>
            <label for='newSchool'>Add a new school</label>
            <input type="text" id="newSchool" placeholder="Enter school name">
            <button type="button" id="addSchoolBtn" class="small-btn">Add School</button>
          </div>
        </div>
        
        <div class='classSection' id='classSection' style='display: block;'>
          <label for='classSelect'>Select Class</label>
          <select id='classSelect' disabled>
            <option value=''>Select school first</option>
          </select>
          <div id='newClassContainer' style='display: none;'>
            <label for='newClass'>Add a new Class</label>
            <input type='text' id='newClass' placeholder='Enter class name'>
            <button type='button' id='addClassBtn' class="small-btn">Add Class</button>
          </div>
        </div>
        
        <button type="button" id='btnSubmit' class="submit-btn">Sign Up</button>
        
        <div class='statusMessage' id='statusMessage'></div>
        
        <div class="login-link">
          Already have an account? <a href="index.html">Login here</a>
        </div>
      </div>
    </div>
    
  <script>
    const supabase_url = 'https://pxjndwrkafegopsolnde.supabase.co'
    const supabase_key = 'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
    
    const supabaseClient = supabase.createClient(
      'https://pxjndwrkafegopsolnde.supabase.co',
      'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
    );

    let teacherCheckbox =  document.getElementById('isTeacher')
    let usernameElement = document.getElementById('Username');
    let passwordElement = document.getElementById('Password');
    let nameElement = document.getElementById('Name')
    let statusElement = document.getElementById('statusMessage')
    let schoolSelect = document.getElementById('schoolSelect');
    let newSchoolContainer = document.getElementById('newSchoolContainer');
    let newSchoolInput = document.getElementById('newSchool');
    let addSchoolBtn = document.getElementById('addSchoolBtn');
    let classSection = document.getElementById('classSection');
    let classSelect = document.getElementById('classSelect');
    let newClassContainer = document.getElementById('newClassContainer');
    let newClassInput = document.getElementById('newClass');
    let addClassBtn = document.getElementById('addClassBtn');

    let selectedSchoolId = null;
    let userType = ''
    
    async function loadSchools() {
        const {data, error} = await supabaseClient
          .from('schools')
          .select('school')
          .order('school');

        if(error) {
          console.error('Error loading schools:', error);
          schoolSelect.innerHTML = '<option value="">Error loading schools</option>';
          return;
        }
        
        schoolSelect.innerHTML = '<option value="">Select a School</option>';

        data.forEach(school => {
          let option = document.createElement('option')
          option.value = school.school;
          option.textContent = school.school;
          schoolSelect.appendChild(option);
        });

        let otherOption = document.createElement('option');
        otherOption.value = 'other';
        otherOption.textContent = 'Add another School';
        schoolSelect.appendChild(otherOption);
    }

    function toggleAddSchool() {
      let selectedValue = schoolSelect.value;
      if (selectedValue === 'other') {
        newSchoolContainer.style.display = 'block';
      } else {
        newSchoolContainer.style.display = 'none';
      }
    }

    async function addNewSchool() {
      let newSchoolName = newSchoolInput.value.trim()
      
      if(!newSchoolName) {
        updateStatus('Please enter a school name');
        return;
      }
      
      const {data: existing, error: checkError} = await supabaseClient
        .from('schools')
        .select('school')
        .eq('school', newSchoolName)
      
      if(existing && existing.length > 0) {
        updateStatus('School already exists');
        return;
      }
      
      const {data, error} = await supabaseClient
        .from('schools')
        .insert([{school: newSchoolName}])
        .select();
      
      if(error) {
        updateStatus('Error adding school: ' + error.message);
        return;
      }
      
      await loadSchools();
      if(data && data.length > 0) {
        schoolSelect.value = data[0].school;
      }
      newSchoolContainer.style.display = 'none';
      newSchoolInput.value = '';
      await loadClasses(schoolSelect.value);
      updateStatus('School added successfully');
    }

    async function loadClasses(school) {
      if(!school || school === '' || school === 'other') {
        classSection.style.display = 'none';
        classSelect.disabled = true;
        classSelect.innerHTML = '<option value="">Select school first</option>';
      } else {
        classSection.style.display = 'block';
        classSelect.disabled = false;

        const{data: classes, error} = await supabaseClient
          .from('classes')
          .select('class_name')
          .eq('school',school)
          .order('class_name');

        if(error) {
          console.error('Error loading classes:', error);
          classSelect.innerHTML = '<option value="">Error loading classes</option>';
          return;
        }

        classSelect.innerHTML = '<option value="">Select a class</option>';
        
        classes.forEach(cls => {
          let option = document.createElement('option');
          option.value = cls.class_name;
          option.textContent = cls.class_name;
          classSelect.appendChild(option);
        });

        let otherOption = document.createElement('option');
        otherOption.value = 'other';
        otherOption.textContent = 'Add new Class';
        classSelect.appendChild(otherOption);
      }
    }

    function toggleNewClassInput() {
      let selectedValue = classSelect.value;
      if (selectedValue === 'other') {
        newClassContainer.style.display = 'block';
      } else {
        newClassContainer.style.display = 'none';
      }
    }

    function updateStatus(message) {
      statusElement.textContent = message;
      if (message.includes('already') || message.includes('Invalid') || message.includes('failed') || message.includes('not') || message.includes('must') || message.includes('Please') || message.includes('Error')) {
        statusElement.classList.add('error');
      } else {
        statusElement.classList.remove('error');
      }
    }
    
    function hash(password) {
      let product = 1;
      for(let i = 0; i < password.length; i++) {
        product *= password.charCodeAt(i);
      }
      return product
    }
    
    function computeAsciiSum(str) {
      let sum = 0;
      for(let i = 0; i < str.length; i++) {
        sum += str.charCodeAt(i);
      }
      return sum;
    }
    
    async function addNewClass() {
      let className = newClassInput.value.trim();
      let selectedSchoolName = schoolSelect.value;
      
      if (!className) {
        updateStatus('Please enter a class name');
        return;
      }
      
      if(!selectedSchoolName || selectedSchoolName === '' || selectedSchoolName === 'other') {
        updateStatus('Please select a valid school first');
        return;
      }
      
      const {data: existing, error: checkError} = await supabaseClient
        .from('classes')
        .select('class_name')
        .eq('class_name', className)
        .eq('school', selectedSchoolName);
      
      if(existing && existing.length > 0) {
        updateStatus('Class already exists in this school');
        return;
      }
      
      const asciiSumClass = computeAsciiSum(className);
      const asciiSumSchool = computeAsciiSum(selectedSchoolName);
      const combinedClassCode = asciiSumClass + asciiSumSchool;
      
      const {data, error} = await supabaseClient
        .from('classes')
        .insert([{
          class_code: combinedClassCode,
          class_name: className,
          school: selectedSchoolName
        }]);
      
      if(error) {
        updateStatus('Error adding class: ' + error.message);
        return;
      }
      
      updateStatus('Class added successfully');
      newClassInput.value = '';
      newClassContainer.style.display = 'none';
      await loadClasses(selectedSchoolName);
      classSelect.value = className;
    }

    function getUserType(){
      var isChecked = teacherCheckbox.checked;
      if (isChecked) {
        userType = 'Teacher'
      } else {
        userType = 'Student'
      }
    }

    async function checkValidation() {
      let selectedClass = classSelect.value;
      let selectedSchool = schoolSelect.value;
      let username = usernameElement.value.trim();
      let password = passwordElement.value;
      let fullName = nameElement.value.trim();
      
      if(!username) {
        updateStatus('Username is required');
        return false;
      }
      
      const { data, error } = await supabaseClient
        .from('userinfo')
        .select('username')
        .eq('username', username);
        
      if(error) {
        updateStatus('Error checking username');
        return false;
      }
      
      if(data && data.length > 0) {
        updateStatus('Username already taken');
        return false;
      }
      
      if(username.length < 3) {
        updateStatus('Username must be at least 3 characters');
        return false;
      }
      
      if (password.length < 8) {
        updateStatus('Password must be at least 8 characters');
        return false;
      }
      
      if (password.includes(' ')) {
        updateStatus('Password cannot contain spaces');
        return false;
      }
      
      if (fullName.length < 2 || fullName.length > 50) {
        updateStatus('Name must be 2-50 characters');
        return false;
      }
      
      const nameRegex = /^[a-zA-Z\s]+$/;
      if (!nameRegex.test(fullName)) {
        updateStatus('Name must contain only letters and spaces');
        return false;
      }
      
      if (!selectedSchool || selectedSchool === '' || selectedSchool === 'other') {
        updateStatus('Please select a valid school');
        return false;
      }
      
      if (!selectedClass || selectedClass === '' || selectedClass === 'none' || selectedClass === 'other') {
        updateStatus('Please select a valid class');
        return false;
      }
      
      return true;
    }

    async function uploadCredentials() {
      getUserType()
      
      const isValid = await checkValidation();
      if (!isValid) {
        return;
      }
      
      const selectedClass = classSelect.value;
      const selectedSchool = schoolSelect.value;
      const username = usernameElement.value.trim();
      const fullName = nameElement.value.trim();
      const passwordHash = hash(passwordElement.value);
      
      const { data, error } = await supabaseClient
        .from('userinfo')
        .insert([
          { 
            username: username, 
            name: fullName, 
            password_hash: passwordHash, 
            user_type: userType, 
            class: selectedClass, 
            school: selectedSchool 
          }
        ]);
      
      if (error) {
        console.error('Upload error:', error);
        updateStatus('Registration failed: ' + error.message);
      } else {
        console.log('Upload successful:', data);
        updateStatus('Registration successful! Redirecting...');
        setTimeout(() => {
          window.location.href = 'index.html'
        },1500)
      }
    }
    
    document.addEventListener('DOMContentLoaded', function () {
      loadSchools()

      schoolSelect.addEventListener('change', function() {
        toggleAddSchool();
        const selectedSchool = schoolSelect.value;
        if(selectedSchool && selectedSchool !== '' && selectedSchool !== 'other') {
          loadClasses(selectedSchool);
        } else if(selectedSchool === 'other') {
          classSelect.disabled = true;
          classSelect.innerHTML = '<option value="">Select school first</option>';
          classSection.style.display = 'block';
        } else {
          classSelect.disabled = true;
          classSelect.innerHTML = '<option value="">Select school first</option>';
        }
      });
      
      classSelect.addEventListener('change', function() {
        toggleNewClassInput();
      });

      addSchoolBtn.addEventListener('click', addNewSchool);
      addClassBtn.addEventListener('click', addNewClass);
      
      let button = document.getElementById('btnSubmit');
      button.addEventListener('click', function () {
        uploadCredentials()
      });
      
      usernameElement.addEventListener('keypress', function(e) {
        if(e.key === 'Enter') {
          uploadCredentials();
        }
      });
      
      passwordElement.addEventListener('keypress', function(e) {
        if(e.key === 'Enter') {
          uploadCredentials();
        }
      });
    });
  </script>
  </body>
</html>
