<!DOCTYPE html>
<html>
  <head>
    <title>Sign Up - Revision App</title>
    <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
    <style>
      /* Remove browser defaults */
      * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      }

      /* White background with subtle gradient */
      body {
          background: linear-gradient(135deg, #f5f7fa 0%, #ffffff 100%);
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
      }

      /* Main container - centered card */
      .container {
          width: 100%;
          max-width: 550px;
          margin: 0 auto;
      }

      /* Signup form card */
      .signupForm {
          background: white;
          border-radius: 30px;
          padding: 45px 40px;
          box-shadow: 0 20px 60px rgba(0,0,0,0.08);
          border: 1px solid #f0f0f0;
          transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .signupForm:hover {
          transform: translateY(-5px);
          box-shadow: 0 30px 80px rgba(102, 126, 234, 0.12);
      }

      /* Form title */
      .signupForm h2 {
          color: #2d3748;
          font-size: 2.2rem;
          font-weight: 700;
          margin-bottom: 35px;
          text-align: center;
          background: #f8fafc;
          padding: 20px 30px;
          border-radius: 50px;
          display: inline-block;
          width: 100%;
          border-left: 4px solid #667eea;
          border: 1px solid #e2e8f0;
      }

      /* Labels */
      .signupForm label {
          display: block;
          margin-bottom: 8px;
          font-weight: 600;
          color: #4a5568;
          font-size: 0.95rem;
          text-transform: uppercase;
          letter-spacing: 0.5px;
          margin-left: 5px;
      }

      /* Input fields */
      .signupForm input[type="text"],
      .signupForm input[type="password"],
      .signupForm select {
          width: 100%;
          padding: 15px 20px;
          border: 2px solid #e2e8f0;
          border-radius: 50px;
          font-size: 1rem;
          color: #2d3748;
          background: white;
          transition: all 0.3s ease;
          margin-bottom: 20px;
      }

      .signupForm input:hover,
      .signupForm select:hover {
          border-color: #667eea;
      }

      .signupForm input:focus,
      .signupForm select:focus {
          outline: none;
          border-color: #667eea;
          box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      /* Disabled select styling */
      .signupForm select:disabled {
          background: #f7fafc;
          cursor: not-allowed;
          opacity: 0.7;
      }

      /* Checkbox container */
      .checkbox-container {
          display: flex;
          align-items: center;
          gap: 12px;
          margin: 25px 0;
          padding: 15px 20px;
          background: #f8fafc;
          border-radius: 50px;
          border: 1px solid #e2e8f0;
      }

      .checkbox-container label {
          margin: 0;
          text-transform: none;
          font-size: 1rem;
          color: #2d3748;
      }

      .checkbox-container input[type="checkbox"] {
          width: 20px;
          height: 20px;
          cursor: pointer;
          accent-color: #667eea;
      }

      /* School and Class sections */
      .schoolSection,
      .classSection {
          margin: 25px 0;
          padding: 20px;
          background: #f8fafc;
          border-radius: 30px;
          border: 1px solid #e2e8f0;
      }

      /* New school/class containers */
      #newSchoolContainer,
      #newClassContainer {
          margin-top: 20px;
          padding: 20px;
          background: white;
          border-radius: 25px;
          border: 2px dashed #667eea;
          animation: slideDown 0.3s ease;
      }

      @keyframes slideDown {
          from {
              opacity: 0;
              transform: translateY(-10px);
          }
          to {
              opacity: 1;
              transform: translateY(0);
          }
      }

      /* Small buttons for add school/class */
      .small-btn {
          padding: 12px 25px;
          border: none;
          border-radius: 50px;
          font-size: 0.9rem;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.3s ease;
          background: white;
          color: #4a5568;
          border: 2px solid #667eea;
          margin-top: 10px;
          width: auto;
          display: inline-block;
      }

      .small-btn:hover {
          background: #667eea;
          color: white;
          transform: translateY(-2px);
          box-shadow: 0 6px 12px rgba(102, 126, 234, 0.2);
      }

      .small-btn:active {
          transform: scale(0.98);
      }

      /* Submit button */
      .submit-btn {
          width: 100%;
          padding: 18px 30px;
          border: none;
          border-radius: 50px;
          font-size: 1.1rem;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.3s ease;
          background: #667eea;
          color: white;
          box-shadow: 0 4px 6px rgba(0,0,0,0.05);
          margin: 25px 0 15px 0;
          text-transform: uppercase;
          letter-spacing: 1px;
      }

      .submit-btn:hover {
          background: #5a67d8;
          transform: translateY(-2px);
          box-shadow: 0 6px 12px rgba(102, 126, 234, 0.2);
      }

      .submit-btn:active {
          transform: scale(0.98);
      }

      /* Status message */
      .statusMessage {
          padding: 15px 25px;
          border-radius: 50px;
          margin: 15px 0;
          font-weight: 600;
          animation: slideIn 0.3s ease;
          text-align: center;
          background: #f8fafc;
          color: #4a5568;
          border: 1px solid #e2e8f0;
          min-height: 60px;
          display: flex;
          align-items: center;
          justify-content: center;
      }

      /* Success message styling */
      .statusMessage:not(:empty) {
          background: #f0fff4;
          color: #276749;
          border-left: 4px solid #48bb78;
          border: 1px solid #c6f6d5;
      }

      /* Login link */
      .login-link {
          text-align: center;
          margin-top: 20px;
          padding-top: 20px;
          border-top: 2px solid #f0f0f0;
          color: #4a5568;
          font-size: 0.95rem;
      }

      .login-link a {
          color: #667eea;
          text-decoration: none;
          font-weight: 600;
          transition: color 0.3s ease;
      }

      .login-link a:hover {
          color: #5a67d8;
          text-decoration: underline;
      }

      /* Placeholder styling */
      .signupForm input::placeholder,
      .signupForm select::placeholder {
          color: #a0aec0;
          opacity: 0.7;
      }

      /* Animation */
      @keyframes slideIn {
          from {
              opacity: 0;
              transform: translateY(-10px);
          }
          to {
              opacity: 1;
              transform: translateY(0);
          }
      }

      /* Responsive design */
      @media (max-width: 600px) {
          .signupForm {
              padding: 30px 20px;
          }
          
          .signupForm h2 {
              font-size: 1.8rem;
              padding: 15px 20px;
          }
          
          .container {
              max-width: 100%;
          }
          
          .checkbox-container {
              flex-direction: column;
              text-align: center;
          }
      }

      /* Background pattern */
      body::before {
          content: '';
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: radial-gradient(circle at 20% 20%, rgba(102, 126, 234, 0.03) 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, rgba(102, 126, 234, 0.03) 0%, transparent 50%);
          pointer-events: none;
      }

      /* Focus visible for accessibility */
      .submit-btn:focus-visible,
      .small-btn:focus-visible,
      .signupForm input:focus-visible,
      .signupForm select:focus-visible {
          outline: 2px solid #667eea;
          outline-offset: 2px;
      }

      /* Custom scrollbar for select dropdowns */
      select {
          appearance: none;
          background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234a5568' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
          background-repeat: no-repeat;
          background-position: right 15px center;
          background-size: 15px;
      }

      /* Hide default select arrow in IE */
      select::-ms-expand {
          display: none;
      }
    </style>
  </head>
  
  <body>
    <!-- Main container for the signup form -->
    <div class="container">
      <!-- Signup form -->
      <div class='signupForm'>
        <h2>Create an Account</h2>
        
        <!-- Username input field -->
        <label for='Username'>Username</label><br>
        <input type='text' id='Username' username=username placeholder="Enter username"><br>
        
        <!-- Password input field -->
        <label for='Password'>Password</label><br>
        <input type='password' id='Password' password=password placeholder="Enter password (min. 8 characters)"><br>
        
        <!-- Full name input field -->
        <label for='Name'>Full Name</label><br>
        <input type='text' id='Name' name=name placeholder="Enter your full name"><br>
        
        <!-- Teacher checkbox -->
        <div class="checkbox-container">
          <label for='isTeacher'>Are you a Teacher?</label> 
          <input type="checkbox" class='isTeacher' id='isTeacher'>
        </div>
        
        <!-- School Selection Section -->
        <div class='schoolSection'>
          <label for='schoolSelect'>Select School</label><br>
          
          <!-- Dropdown for schools -->
          <select id="schoolSelect">
            <option value="">Loading schools...</option>
          </select>

          <!-- Container for adding a new school (hidden by default) -->
          <div id='newSchoolContainer' style='display:none;'>
            <label for='newSchool'>Add a new school</label>
            <input type="text" id="newSchool" placeholder="Enter school name">
            <button type="button" id="addSchoolBtn" class="small-btn">Add School</button>
          </div>
        </div>
        
        <!-- Class Selection Section -->
        <div class='classSection' id='classSection' style='display: block;'>
          <label for='classSelect'>Select Class</label><br>

          <!-- Class dropdown (disabled until school is selected) -->
          <select id='classSelect' disabled>
            <option value=''>Select school first</option>
          </select>

          <!-- Container for adding a new class (hidden by default) -->
          <div id='newClassContainer' style='display: none;'>
            <label for='newClass'>Add a new Class</label><br>
            <input type='text' id='newClass' placeholder='Enter class name'>
            <button type='button' id='addClassBtn' class="small-btn">Add Class</button>
          </div>
        </div>
        
        <!-- Submit button -->
        <button type="button" id='btnSubmit' class="submit-btn">Sign Up</button>
        
        <!-- Status message display area -->
        <div class='statusMessage' id='statusMessage'></div>
        
        <!-- Login link -->
        <div class="login-link">
          Already have an account? <a href="index.html">Login here</a>
        </div>
      </div>
    </div>
    
  <script>
    // Supabase configuration
    const supabase_url = 'https://pxjndwrkafegopsolnde.supabase.co'
    const supabase_key = 'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
    
    // Initialize Supabase client
    const supabaseClient = supabase.createClient(
      'https://pxjndwrkafegopsolnde.supabase.co',
      'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
    );

    // Get DOM elements
    let teacherCheckbox =  document.getElementById('isTeacher')
    let usernameElement = document.getElementById('Username');
    let passwordElement = document.getElementById('Password');
    let nameElement = document.getElementById('Name')
    let statusElement = document.getElementById('statusMessage')
    let schoolSelect = document.getElementById('schoolSelect');
    let newSchoolContainer = document.getElementById('newSchoolContainer');
    let newSchoolInput = document.getElementById('newSchool');
    let addSchoolBtn = document.getElementById('addSchoolBtn');
    let classSection = document.getElementById('classSection');
    let classSelect = document.getElementById('classSelect');
    let newClassContainer = document.getElementById('newClassContainer');
    let newClassInput = document.getElementById('newClass');
    let addClassBtn = document.getElementById('addClassBtn');

    let selectedSchoolId = null;
    let userType = ''
    let selectedClassCode = null;
    
    // Load schools from database
    async function loadSchools() {
        const {data, error} = await supabaseClient
          .from('schools')
          .select('school')
          .order('school');

        console.log(data)
      schoolSelect.innerHTML = '<option value="">Select a School</option>';

      data.forEach(school => {
        let option = document.createElement('option')
        option.value = school.school;
        option.textContent = school.school;
        schoolSelect.appendChild(option);
      });

    let otherOption = document.createElement('option');
    otherOption.value = 'other';
    otherOption.textContent = 'Add another School';
    schoolSelect.appendChild(otherOption);
    }

    // Toggle add school input visibility
    function toggleAddSchool() {
      let selectedValue = schoolSelect.value;

      if (selectedValue === 'other') {
        newSchoolContainer.style.display = 'block';
      } else {
        newSchoolContainer.style.display = 'none';
      }
    }

    // Add new school to database
    async function addNewSchool() {
      let newSchoolName = newSchoolInput.value.trim()

      const {data,error} = await supabaseClient
        .from('schools')
        .select('school')
        .eq('school', newSchoolName)
      
      if(data && data.length === 0) {
        const {data: insertData,error: insertError} = await supabaseClient
          .from('schools')
          .insert([{school: newSchoolName}])

        await loadSchools();
        schoolSelect.value = newSchoolName;
        selectedSchool = newSchoolName;
        newSchoolContainer.style.display = 'none';
        updateStatus('School added successfully');
      } else {
        updateStatus('School Exists');
      }
    }

    // Generate class code from school name and class name
    function generateClassCode(schoolName, className) {
      let combinedString = schoolName + className;
      let classCode = 0;
      for (let i = 0; i < combinedString.length; i++) {
        classCode += combinedString.charCodeAt(i);
      }
      return classCode;
    }

    // Load classes based on selected school
    async function loadClasses(school) {
      if(!school || school === '' || school === 'other') {
        classSection.style.display = 'none';
        classSelect.disabled = true;
      } else {
        classSection.style.display = 'block';
        classSelect.disabled = false;

        const{data: classes, error} = await supabaseClient
          .from('classes')
          .select('class_name, class_code')
          .eq('school',school)
          .order('class_name');

        classSelect.innerHTML = '<option value="">Select a class</option>';
        
        classes.forEach(cls => {
          let option = document.createElement('option');
          option.value = cls.class_code;
          option.textContent = cls.class_name;
          classSelect.appendChild(option);
        });

        let otherOption = document.createElement('option');
        otherOption.value = 'other';
        otherOption.textContent = 'Add new Class';
        classSelect.appendChild(otherOption);
      }
    }

    // Toggle add class input visibility
    function toggleNewClassInput() {
      let selectedValue = classSelect.value;
      
      if (selectedValue === 'other') {
        newClassContainer.style.display = 'block';
      } else {
        newClassContainer.style.display = 'none';
        // Store the selected class code
        if (selectedValue && selectedValue !== '') {
          selectedClassCode = parseInt(selectedValue);
        }
      }
    }

    // Update status message
    function updateStatus(message) {
      statusElement.textContent = message;
    }

    // Hash function for password
    function hash(password) {
      let product = 1;
      for(let i = 0; i < password.length; i++) {
        product *= password.charCodeAt(i);
      }
      return product
    }

    // Add new class to database
    async function addNewClass() {
      let className = newClassInput.value.trim();
      let selectedSchool = schoolSelect.value;

      if (!className) {
        updateStatus('Enter Class Name');
        return;
      } else {
        const {data, error} = await supabaseClient
          .from('classes')
          .select('class_name')
          .eq('class_name', className)
          .eq('school', selectedSchool)
        
        if (data && data.length === 0) {
          // Generate class code using school name and class name
          let classCode = generateClassCode(selectedSchool, className);
          
          const {data: insertData, error: insertError} = await supabaseClient
            .from('classes')
            .insert([{
              class_code: classCode,
              class_name: className,
              school: selectedSchool
            }]);
          
          if (!insertError) {
            updateStatus('Class added successfully');
            // Set the selected class code to the newly created one
            selectedClassCode = classCode;
            await loadClasses(selectedSchool);
            // Select the newly added class
            classSelect.value = classCode;
            newClassContainer.style.display = 'none';
          } else {
            updateStatus('Error adding class');
          }
        } else {
          updateStatus('Class already exists');
        }
      }
    }

    // Get user type from checkbox
    function getUserType(){
      var isChecked = teacherCheckbox.checked;
      console.log(isChecked)
      if (isChecked) {
        userType = 'Teacher'
      } else {
        userType = 'Student'
      }
    }

    // Validate all form inputs
    async function checkValidation() {
      let selectedClassCode = classSelect.value;
      let selectedSchool = schoolSelect.value;

      const { data, error } = await supabaseClient
        .from('userinfo')
        .select('username')
        .eq('username', usernameElement.value);

      if ((error || !data || data.length === 0) && (usernameElement.value.length > 0)) {
        if (passwordElement.value.length >= 8 && !passwordElement.value.includes(' ')) {
          if (nameElement.value.length > 2 && nameElement.value.length < 50 && /^[a-zA-Z\s]+$/.test(nameElement.value)) {
            if (selectedSchool && selectedSchool !== '' && !(selectedSchool === 'other' )) {
              if (selectedClassCode && selectedClassCode !== '' && selectedClassCode !== 'none' && !(selectedClassCode === 'other' )) {
                return true;
              } else {
                updateStatus('Please select a valid class');
                return false;
              }
            } else {
              updateStatus('Please select a valid school');
              return false;
            }
          } else {
            updateStatus('Name must be 3-50 letters only');
            return false;
          }
        } else {
          updateStatus('Password must be at least 8 characters and no spaces');
          return false;
        }
      } else {
        updateStatus('Username already taken or invalid');
        return false;
      }
    }

    // Upload user credentials to database
    async function uploadCredentials() {
      getUserType()
      
      if (await checkValidation() === true) {
        // Get the class code from the select value
        let classCodeToInsert = parseInt(classSelect.value);
        
        const { data, error } = await supabaseClient
          .from('userinfo')
          .insert([
            { username: usernameElement.value, name: nameElement.value, password_hash: hash(passwordElement.value), user_type: userType, class: classCodeToInsert, school: schoolSelect.value }
          ]);
        
        if (error) {
          console.error('Upload error:', error);
          updateStatus('Registration failed: ' + error.message);
        } else {
          console.log('Upload successful:', data);
          updateStatus('Registration successful! Redirecting...');
          setTimeout(() => {
            window.location.href = 'index.html'
          },1500)
        }
      }
    }
    
    // Event listeners when DOM is loaded
    document.addEventListener('DOMContentLoaded', function () {
      loadSchools()

      schoolSelect.addEventListener('change', function() {
        toggleAddSchool();
        loadClasses(schoolSelect.value);
      });
      
      classSelect.addEventListener('change', function() {
        toggleNewClassInput();
      });

      addSchoolBtn.addEventListener('click', addNewSchool);
      addClassBtn.addEventListener('click', addNewClass);
      
      let button = document.getElementById('btnSubmit');
      button.addEventListener('click', function () {
        uploadCredentials()
      });
    });
  </script>
  </body>
</html>
