        //Update topic performance function
        async function updateTopicPerformance(topicId, studentId, wasCorrect) {
          // Get current performance
          const {data: currentPerformance, error} = await supabaseClient
            .from('topic_performance')
            .select('*')
            .eq('student_id', studentId)
            .eq('topic_id', topicId);
          //If the record exists update it
          if (currentPerformance && currentPerformance.length > 0) {
            const updatedPerformance = currentPerformance[0];

            //Calculate the new values
            const newAttempted = updatedPerformance.questions_attempted +1;
            const newCorrect = updatedPerformance.questions_correct + (wasCorrect ? 1 : 0);
            const newAccuracy = (newCorrect / newAttempted) * 100
            
            
            //Update the record with the new data
            const{error} = await supabaseClient 
            .from('topic_performance')
            .update({
                questions_attempted: newAttempted,
                questions_correct: newCorrect,
                accuracy_percent: Math.round(newAccuracy)
            })
            .eq('performance_id', updatedPerformance.performance_id);

            
            
          }
          //If the record doesnt exist create a new one
          else {
            const {error} = await supabaseClient
              .from('topic_performance')
              .insert([{
                student_id: studentId,
                topic_id: topicId,
                questions_attempted: 1,
                questions_correct: wasCorrect ? 1 : 0,
                accuracy_percent: wasCorrect ? 100 : 0
              }])
          }
          
        }

//Order the topics
async function orderTopics () {
  const weaknesses = await getWeaknesses()
  let {data: orderedTopics, error} = await supabaseClient
    .from('topic_performance')
    .select('topic_id, accuracy_percent')
    .eq('student_id', 'StudentTest')
  
  // Bubble sort for array of objects
  let len = orderedTopics.length;
  for (let i = 0; i < len - 1; i++) {
    for (let j = 0; j < len - 1 - i; j++) {
      // Use .accuracy_percent instead of [1]
      if (orderedTopics[j].accuracy_percent > orderedTopics[j + 1].accuracy_percent) {
        let temp = orderedTopics[j];
        orderedTopics[j] = orderedTopics[j + 1];
        orderedTopics[j + 1] = temp;
      }
    }
  }
  
  console.log(orderedTopics);
  return orderedTopics;
}

// Function to get the questions
async function getQuestion (weakestTopic) {
  // Get the style - this returns an array like [{preferred_style: 'visual'}]
  let style = await getStyle();
  
  let preferredStyle = style && style.length > 0 ? style[0].preferred_style : 'mixed';
  
  console.log('Preferred style value:', preferredStyle);
  console.log('Weakest topic:', weakestTopic);



  //Get the current accuracy
  const{data:accuracy} = await supabaseClient
        .from('topic_performance')
        .select('accuracy_percent')
        .eq('student_id', 'StudentTest')
        .eq('topic_id', weakestTopic);
  //set difficulty based on accuracy 
    let accuracyValue = 50; // Default
    let difficultyValue = 3; // Default medium
    
    if (accuracy && accuracy.length > 0) {
        accuracyValue = accuracy[0].accuracy_percent;
        
        // Convert accuracy to difficulty level 1-5
        if (accuracyValue < 40) {
            difficultyValue = 1; // Easy
        }
        else if (accuracyValue >= 40 && accuracyValue < 60) {
            difficultyValue = 2; // Medium-Easy
        }
        else if (accuracyValue >= 60 && accuracyValue < 70) {
            difficultyValue = 3; // Medium
        }
        else if (accuracyValue >= 70 && accuracyValue < 80) {
            difficultyValue = 4; // Medium-Hard
        }
        else if (accuracyValue >= 80) {
            difficultyValue = 5; // Hard
        }
    }
  
  // Get questions of weakest topic of preferred style
  const { data: questions, error } = await supabaseClient
    .from('questions')
    .select('*')
    .eq('question_type', preferredStyle)
    .eq('topic_id', weakestTopic)
    .eq('difficulty', difficultyValue);
  
  if (error) {
    console.error('Error fetching questions:', error);
    return [];
  }
  
  console.log('Questions found:', questions);
  return questions;
}
