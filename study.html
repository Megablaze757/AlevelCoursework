<!DOCTYPE html>

<head>

.checkAnswer {
background: #1976d2;
color: white;
padding: 15px 30px;
border-radius: 50px;
font-weight: bold;
font-size: 18px;
text-align: center;
cursor: pointer;

color: #2e7d32;
border: 2px solid #4caf50;

.topicItem:last-child {

.topicName {

  flex: 2;
}

.topicBefore, .topicAfter, .topicChange {

.topicBefore {

}

.topicAfter {

}

.topicChange.positive {

}

.topicChange.negative {

}

.sessionStats {

}

.statBox {

}

.statBox .statLabel {

.statBox .statValue {

.modalButtons {

}

.modalButton.primary {

}

.modalButton.primary:hover {

}

.modalButton.secondary {

.topicHeader {

}

.topicHeader span {

}

.topicHeader span:first-child {

.nextQuestionBtn {

<body>
<div class="layout">

<div class="scorePanel">

  <script>
    const endSessionModal = document.getElementById('endSessionModal');
    const topicList = document.getElementById('topicList');
    const modalCorrect = document.getElementById('modalCorrect');
    const modalIncorrect = document.getElementById('modalIncorrect');
    const modalAccuracy = document.getElementById('modalAccuracy');
    const newSessionBtn = document.getElementById('newSessionBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const homeBtn = document.getElementById('homeBtn');
    
    const username = sessionStorage.getItem('username');
    if (!username) {
        window.location.href = 'index.html';
    }
    
    let correctCount = 0
    let incorrectCount = 0

    let sessionQuestions = [];
    let currentQuestionIndex = 0;
    let askedQuestionIds = [];
    let topicCorrect = [];
    let topicTotal =[];
    
    let question_id = 1;

    let student_id = username;
 
    console.log('Current student:', student_id);

    const checkAnswer = document.getElementById('checkAnswer');
    const answerBox = document.getElementById('answerBox');
    const numCorrect = document.getElementById('numCorrect');
    const numIncorrect = document.getElementById('numIncorrect');
    const feedback = document.getElementById('feedback');
    const questionHolder = document.getElementById('questionHolder');
    const nextQuestion = document.getElementById('nextQuestionBtn');
    const endSession = document.getElementById('endSession');
    
    let orderedTopicsList = [];
    let currentTopicIndex = 0;
    let currentTopicId = null;

    let initialTopicAccuracies = {};
    let selectedTopicName = sessionStorage.getItem('selectedTopic');
    let selectedTopicId = null;
    console.log('Selected topic', selectedTopicName);

    
let questions = [];

let currentQuestionAttempts = 0;

    
const supabase_url = 'https://pxjndwrkafegopsolnde.supabase.co'
const supabase_key = 'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'

const supabaseClient = supabase.createClient(
  'https://pxjndwrkafegopsolnde.supabase.co',
  'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
);

    async function getNextPerformanceId() {
      const { data: performances } = await supabaseClient
        .from('topic_performance')
        .select('perfomance_id')
        .order('perfomance_id', { ascending: false })
        .limit(1);
      
      if (performances && performances.length > 0) {
        return performances[0].perfomance_id + 1;
      }
      return 1;
    }

    async function ensureStudentExists() {
      const { data: existingStudent } = await supabaseClient
        .from('students')
        .select('student_id')
        .eq('student_id', student_id)
        .single();
    
      if (!existingStudent) {
        const { error: insertError } = await supabaseClient
          .from('students')
          .insert([{
            student_id: student_id,
            target_grade: null,
            class_code: null
          }]);
        
        if (insertError) {
          console.error('Error creating student record:', insertError);
        } else {
          console.log('Student record created successfully');
        }
      }
    }

    async function initializeNewUser() {
        await ensureStudentExists();
        
        const { data: existingPerformance } = await supabaseClient
            .from('topic_performance')
            .select('topic_id')
            .eq('student_id', student_id);
        
        if (!existingPerformance || existingPerformance.length === 0) {
            const { data: allTopics } = await supabaseClient
                .from('topics')
                .select('topic_id');
            
            if (allTopics && allTopics.length > 0) {
                let nextId = await getNextPerformanceId();
                const defaultPerformances = allTopics.map(topic => ({
                    perfomance_id: nextId++,
                    student_id: student_id,
                    topic_id: topic.topic_id,
                    questions_attempted: 0,
                    questions_correct: 0,
                    accuracy_percent: 0
                }));
                
                const { error: insertError } = await supabaseClient
                    .from('topic_performance')
                    .insert(defaultPerformances);
                
                if (insertError) {
                    console.error('Error initializing user:', insertError);
                } else {
                    console.log('New user initialized successfully');
                }
            }
        }
    }

    async function getInitialAccuracies() {
      const { data: performances } = await supabaseClient
        .from('topic_performance')
        .select('topic_id, accuracy_percent')
        .eq('student_id', student_id);
        
        if (performances && performances.length > 0) {
            performances.forEach(p => {
            initialTopicAccuracies[p.topic_id] = p.accuracy_percent || 0;
          });
        } else {
            const { data: allTopics } = await supabaseClient
                .from('topics')
                .select('topic_id');
            
            if (allTopics) {
                allTopics.forEach(topic => {
                    initialTopicAccuracies[topic.topic_id] = 0;
                });
            }
        }
      console.log('Initial accuracies:', initialTopicAccuracies);
    }

    async function updateStrengthsWeaknessesForTopic(topicId, newAccuracy) {
      const { data: currentStrength } = await supabaseClient
        .from('strengths')
        .select('*')
        .eq('student_id', student_id)
        .eq('topic_id', topicId)
        .single();
      
      const { data: currentWeakness } = await supabaseClient
        .from('weaknesses')
        .select('*')
        .eq('student_id', student_id)
        .eq('topic_id', topicId)
        .single();
      
      if (newAccuracy > 80) {
        if (!currentStrength) {
          await supabaseClient
            .from('strengths')
            .insert({ 
              student_id: student_id, 
              topic_id: topicId 
            });
          console.log(`Added topic ${topicId} as strength`);
        }
        if (currentWeakness) {
          await supabaseClient
            .from('weaknesses')
            .delete()
            .eq('student_id', student_id)
            .eq('topic_id', topicId);
          console.log(`Removed topic ${topicId} from weaknesses`);
        }
      } 
      else if (newAccuracy < 50) {
        if (!currentWeakness) {
          await supabaseClient
            .from('weaknesses')
            .insert({ 
              student_id: student_id, 
              topic_id: topicId 
            });
          console.log(`Added topic ${topicId} as weakness`);
        }
        if (currentStrength) {
          await supabaseClient
            .from('strengths')
            .delete()
            .eq('student_id', student_id)
            .eq('topic_id', topicId);
          console.log(`Removed topic ${topicId} from strengths`);
        }
      }
      else {
        if (currentStrength) {
          await supabaseClient
            .from('strengths')
            .delete()
            .eq('student_id', student_id)
            .eq('topic_id', topicId);
          console.log(`Removed topic ${topicId} from strengths`);
        }
        if (currentWeakness) {
          await supabaseClient
            .from('weaknesses')
            .delete()
            .eq('student_id', student_id)
            .eq('topic_id', topicId);
          console.log(`Removed topic ${topicId} from weaknesses`);
        }
      }
    }

    async function updateTopicPerformance(topicId, studentId, wasCorrect) {
      try {
        console.log(`Updating performance - Topic: ${topicId}, Student: ${studentId}, Correct: ${wasCorrect}`);
        
        const { data: currentPerformance, error: fetchError } = await supabaseClient
          .from('topic_performance')
          .select('*')
          .eq('student_id', studentId)
          .eq('topic_id', topicId);
        
        if (fetchError) {
          console.error('Error fetching performance:', fetchError);
          return;
        }
        
        if (currentPerformance && currentPerformance.length > 0) {
          const updatedPerformance = currentPerformance[0];
          
          let newAttempted = (updatedPerformance.questions_attempted || 0) + 1;
          let newCorrect = (updatedPerformance.questions_correct || 0) + (wasCorrect ? 1 : 0);
          let newAccuracy = (newCorrect / newAttempted) * 100;
          
          console.log(`Before: Attempted=${updatedPerformance.questions_attempted}, Correct=${updatedPerformance.questions_correct}, Accuracy=${updatedPerformance.accuracy_percent}%`);
          console.log(`After: Attempted=${newAttempted}, Correct=${newCorrect}, Accuracy=${Math.round(newAccuracy)}%`);
          
          const { error: updateError } = await supabaseClient 
            .from('topic_performance')
            .update({
              questions_attempted: newAttempted,
              questions_correct: newCorrect,
              accuracy_percent: Math.round(newAccuracy)
            })
            .eq('perfomance_id', updatedPerformance.perfomance_id);
          
          if (updateError) {
            console.error('Error updating performance:', updateError);
          } else {
            console.log('Performance updated successfully');
            await updateStrengthsWeaknessesForTopic(topicId, Math.round(newAccuracy));
          }
        } else {
          console.log('No existing performance record, creating new one');
          let newAttempted = 1;
          let newCorrect = wasCorrect ? 1 : 0;
          let newAccuracy = wasCorrect ? 100 : 0;
          let nextId = await getNextPerformanceId();
          
          const { error: insertError } = await supabaseClient
            .from('topic_performance')
            .insert([{
              perfomance_id: nextId,
              student_id: studentId,
              topic_id: topicId,
              questions_attempted: newAttempted,
              questions_correct: newCorrect,
              accuracy_percent: newAccuracy
            }]);
          
          if (insertError) {
            console.error('Error inserting performance:', insertError);
          } else {
            console.log('New performance record created successfully');
            await updateStrengthsWeaknessesForTopic(topicId, newAccuracy);
          }
        }
      } catch (error) {
        console.error('Error in updateTopicPerformance:', error);
      }
    }

    checkAnswer.addEventListener('click', async function() {
      if (sessionQuestions.length === 0) {
        feedback.textContent = 'Please click Next Question first';
        feedback.className = 'feedback incorrect';
        feedback.style.display = 'block';
        return;
      }
      
      const userAnswer = answerBox.value.trim().toLowerCase();
      if (!userAnswer) {
        feedback.textContent = 'Please enter an answer';
        feedback.className = 'feedback incorrect';
        feedback.style.display = 'block';
        return;
      }
      
      const currentQuestion = sessionQuestions[currentQuestionIndex];
      const correctAnswer = currentQuestion.correct_answer.toLowerCase();
      const topicId = currentQuestion.topic_id;
      
      if (userAnswer === correctAnswer) {
        feedback.textContent = 'Correct!';
        feedback.className = 'feedback correct';
        correctCount++;
        numCorrect.textContent = correctCount;
        
        nextQuestion.classList.remove('hidden');
        
        console.log('Updating performance for correct answer');
        await updateTopicPerformance(topicId, student_id, true);
        console.log('Performance update completed');
        currentQuestionAttempts = 0;
      } else {
        currentQuestionAttempts++;
        incorrectCount++;
        numIncorrect.textContent = incorrectCount;
        
        if (currentQuestionAttempts >= 3) {
          feedback.textContent = `Incorrect. The correct answer is ${currentQuestion.correct_answer}`;
          feedback.className = 'feedback incorrect';
          
          nextQuestion.classList.remove('hidden');
          
          console.log('Updating performance for incorrect answer after 3 attempts');
          await updateTopicPerformance(topicId, student_id, false);
          console.log('Performance update completed');
          currentQuestionAttempts = 0;
        } else {  
          feedback.textContent = `Incorrect. Try again (Attempt ${currentQuestionAttempts}/3)`;
          feedback.className = 'feedback incorrect';
          
          nextQuestion.classList.add('hidden');
          
          console.log('Updating performance for incorrect answer');
          await updateTopicPerformance(topicId, student_id, false);
          console.log('Performance update completed');
        }
      }
      
      feedback.style.display = 'block';
      askedQuestionIds.push(currentQuestion.question_id);
    });

    async function fetchQuestion() {
      const { data, error } = await supabaseClient
               .from('questions')
               .select('*')
      questions = data;      
    }
    
    async function getStrengths () {
      const { data: strengths, error } = await supabaseClient
        .from('strengths')
        .select('*')
        .eq('student_id', student_id)
      return strengths;
    }

    async function getWeaknesses () {
      const { data: weaknesses, error } = await supabaseClient
        .from('weaknesses')
        .select('topic_id')
        .eq('student_id', student_id)
      return weaknesses;
    }

    async function orderTopics () {
      let { data: orderedTopics, error } = await supabaseClient
        .from('topic_performance')
        .select('topic_id, accuracy_percent')
        .eq('student_id', student_id);

      if (!orderedTopics || orderedTopics.length === 0) {
        const { data: allTopics } = await supabaseClient
            .from('topics')
            .select('topic_id');
        
        if (allTopics && allTopics.length > 0) {
            orderedTopics = allTopics.map(topic => ({
                topic_id: topic.topic_id,
                accuracy_percent: 0
            }));
        } else {
            return [];
        }
      }

      let len = orderedTopics.length;
      for (let i = 0; i < len - 1; i++) {
        for (let j = 0; j < len - 1 - i; j++) {
          if (orderedTopics[j].accuracy_percent > orderedTopics[j + 1].accuracy_percent) {
            let temp = orderedTopics[j];
            orderedTopics[j] = orderedTopics[j + 1];
            orderedTopics[j + 1] = temp;
          }
        }
      }
      return orderedTopics;
    }

    async function getStyle(){
      const { data: learningStyle , error } = await supabaseClient
        .from('adaptive_settings')
        .select('preferred_style')
        .eq('student_id', student_id)
      return learningStyle;
    }
    
    async function getQuestion(topicId) {
      let style = await getStyle();
      let preferredStyle = style && style.length > 0 ? style[0].preferred_style : 'mixed';

      const { data: accuracy } = await supabaseClient
        .from('topic_performance')
        .select('accuracy_percent')
        .eq('student_id', student_id)
        .eq('topic_id', topicId);

      let accuracyValue = 0;
      let difficultyValue = 1;

      if (accuracy && accuracy.length > 0) {
        accuracyValue = accuracy[0].accuracy_percent;

        if (accuracyValue < 40) {
          difficultyValue = 1;
        }
        else if (accuracyValue >= 40 && accuracyValue < 60) {
          difficultyValue = 2;
        }
        else if (accuracyValue >= 60 && accuracyValue < 70) {
          difficultyValue = 3;
        }
        else if (accuracyValue >= 70 && accuracyValue < 80) {
          difficultyValue = 4;
        }
        else if (accuracyValue >= 80) {
          difficultyValue = 5;
        }
      }

      let { data: questions, error } = await supabaseClient
        .from('questions')
        .select('*')
        .eq('question_type', preferredStyle)
        .eq('topic_id', topicId)
        .eq('difficulty', difficultyValue);

      if (!questions || questions.length === 0) {
        const { data: allQuestions } = await supabaseClient
          .from('questions')
          .select('*')
          .eq('question_type', preferredStyle)
          .eq('topic_id', topicId);

        questions = allQuestions;
      }

      if (!questions || questions.length === 0) {
        const { data: anyQuestions } = await supabaseClient
          .from('questions')
          .select('*')
          .eq('topic_id', topicId);
        questions = anyQuestions;
      }

      if (questions && questions.length > 0) {
        const unansweredQuestions = questions.filter(q => !askedQuestionIds.includes(q.question_id));
        
        if (unansweredQuestions.length === 0 && questions.length > 0) {
          const topicQuestionIds = questions.map(q => q.question_id);
          askedQuestionIds = askedQuestionIds.filter(id => !topicQuestionIds.includes(id));
          return questions;
        }
        
        return unansweredQuestions;
      }

      return [];
    }

    async function refreshStrengthsWeaknesses() {
      const { data: performances } = await supabaseClient
        .from('topic_performance')
        .select('topic_id, accuracy_percent')
        .eq('student_id', student_id);
      
      if (!performances || performances.length === 0) return;
      
      await supabaseClient
        .from('strengths')
        .delete()
        .eq('student_id', student_id);
      
      await supabaseClient
        .from('weaknesses')
        .delete()
        .eq('student_id', student_id);
      
      for (let p of performances) {
        const accuracy = p.accuracy_percent;
        const topicId = p.topic_id;
        
        if (accuracy > 80) {
          await supabaseClient
            .from('strengths')
            .insert({ 
              student_id: student_id, 
              topic_id: topicId 
            });
        } else if (accuracy < 50) {
          await supabaseClient
            .from('weaknesses')
            .insert({ 
              student_id: student_id, 
              topic_id: topicId 
            });
        }
      }
    }

    function displayQuestion() {
      if (sessionQuestions && sessionQuestions.length > 0 && currentQuestionIndex < sessionQuestions.length) {
        const currentQuestion = sessionQuestions[currentQuestionIndex];
        questionHolder.innerHTML = currentQuestion.question_text;
        console.log('Question difficulty:', currentQuestion.difficulty);
        console.log('Question type:', currentQuestion.question_type);
        console.log('Topic ID:', currentQuestion.topic_id);
      } else {
        questionHolder.innerHTML = 'No questions available';
      }
    }
      
    document.addEventListener('DOMContentLoaded', async function () {
  
      questionHolder.innerHTML = 'Click "Next Question" to start';
      
      await initializeNewUser();
      await getInitialAccuracies();
      await fetchQuestion();
      await refreshStrengthsWeaknesses();

      if (selectedTopicName) {
        const { data: topic } = await supabaseClient
          .from('topics')
          .select('topic_id')
          .eq('topic_name', selectedTopicName)

        if (topic && topic.length > 0) {
          selectedTopicId = topic[0].topic_id;
        } else {
          selectedTopicId = null;
        }
      }

    nextQuestion.addEventListener('click', async function() {
  
    nextQuestion.classList.add('hidden');
    
    feedback.style.display = 'none';
    feedback.className = 'feedback';
    answerBox.value = '';
    currentQuestionAttempts = 0;
    
    if (selectedTopicId) {
        if (sessionQuestions.length === 0) {
            sessionQuestions = await getQuestion(selectedTopicId);
            if (sessionQuestions && sessionQuestions.length > 0) {
                currentQuestionIndex = 0;
            }
        } 
        else if (currentQuestionIndex < sessionQuestions.length - 1) {
            currentQuestionIndex++;
        } 
        else {
            let newQuestions = await getQuestion(selectedTopicId);
            if (newQuestions && newQuestions.length > 0) {
               
                newQuestions = newQuestions.filter(q => !askedQuestionIds.includes(q.question_id));
                if (newQuestions.length > 0) {
                    sessionQuestions = newQuestions;
                    currentQuestionIndex = 0;
                } else {
                    
                    questionHolder.innerHTML = 'No more new questions in this topic';
                    nextQuestion.classList.remove('hidden');
                    return;
                }
            } else {
                questionHolder.innerHTML = 'No more questions available';
                nextQuestion.classList.remove('hidden'); 
                return;
            }
        }
    } else {
        if (sessionQuestions.length === 0) {
            orderedTopicsList = await orderTopics();
            if (orderedTopicsList && orderedTopicsList.length > 0) {
                currentTopicIndex = 0;
                currentTopicId = orderedTopicsList[0].topic_id;
                sessionQuestions = await getQuestion(currentTopicId);
                currentQuestionIndex = 0;
            }
        } else if (currentQuestionIndex < sessionQuestions.length - 1) {
            currentQuestionIndex++;
        } else {
            currentTopicIndex++;
            
            if (currentTopicIndex >= orderedTopicsList.length) {
                currentTopicIndex = 0;
            }
            
            currentTopicId = orderedTopicsList[currentTopicIndex].topic_id;
            sessionQuestions = await getQuestion(currentTopicId);
            currentQuestionIndex = 0;
        }
    }
    
    if (sessionQuestions && sessionQuestions.length > 0 && currentQuestionIndex < sessionQuestions.length) {
        displayQuestion();
    } else {
        questionHolder.innerHTML = 'No questions available';
        nextQuestion.classList.remove('hidden'); 
    }
});
      endSession.addEventListener('click', async function() {
        await refreshStrengthsWeaknesses();
        
        const { data: topics } = await supabaseClient
          .from('topics')
          .select('topic_id, topic_name');
        
        const { data: performances } = await supabaseClient
          .from('topic_performance')
          .select('topic_id, accuracy_percent')
          .eq('student_id', student_id);
        
        const { data: strengths } = await supabaseClient
          .from('strengths')
          .select('topic_id')
          .eq('student_id', student_id);
        
        const { data: weaknesses } = await supabaseClient
          .from('weaknesses')
          .select('topic_id')
          .eq('student_id', student_id);
        
        let currentAccuracies = {};
        if (performances) {
          performances.forEach(p => {
            currentAccuracies[p.topic_id] = p.accuracy_percent || 0;
          });
        }
        
        const strengthsList = document.getElementById('strengthsList');
        if (strengthsList) {
          if (strengths && strengths.length > 0) {
            strengthsList.innerHTML = '';
            for (let s of strengths) {
              const topic = topics.find(t => t.topic_id === s.topic_id);
              const accuracy = currentAccuracies[s.topic_id] || 0;
              if (topic) strengthsList.innerHTML += `<div>${topic.topic_name} (${accuracy}%)</div>`;
            }
          } else {
            strengthsList.innerHTML = '<div>No strengths yet</div>';
          }
        }
        
        const weaknessesList = document.getElementById('weaknessesList');
        if (weaknessesList) {
          if (weaknesses && weaknesses.length > 0) {
            weaknessesList.innerHTML = '';
            for (let w of weaknesses) {
              const topic = topics.find(t => t.topic_id === w.topic_id);
              const accuracy = currentAccuracies[w.topic_id] || 0;
              if (topic) weaknessesList.innerHTML += `<div>${topic.topic_name} (${accuracy}%)</div>`;
            }
          } else {
            weaknessesList.innerHTML = '<div>No weaknesses yet</div>';
          }
        }
        
        let topicHTML = '';
        for (let topic of topics) {
          const topicId = topic.topic_id;
          const initial = initialTopicAccuracies[topicId] || 0;
          const current = currentAccuracies[topicId] || 0;
          const change = current - initial;
          const changeClass = change >= 0 ? 'positive' : 'negative';
          const changeSymbol = change >= 0 ? '+' : '';
          
          topicHTML += `
            <div class="topicItem">
              <div class="topicName">${topic.topic_name}</div>
              <div class="topicBefore">${initial}%</div>
              <div class="topicAfter">${current}%</div>
              <div class="topicChange ${changeClass}">${changeSymbol}${Math.round(change)}%</div>
            </div>
          `;
        }
        
        topicList.innerHTML = topicHTML;
        
        const totalQuestions = correctCount + incorrectCount;
        const accuracy = totalQuestions > 0 ? Math.round((correctCount/totalQuestions)*100) : 0;
        
        modalCorrect.textContent = correctCount;
        modalIncorrect.textContent = incorrectCount;
        modalAccuracy.textContent = accuracy + '%';
        
        endSessionModal.style.display = 'flex';
      });

      closeModalBtn.addEventListener('click', function() {
        endSessionModal.style.display = 'none';
      });

      newSessionBtn.addEventListener('click', function() {
    correctCount = 0;
    incorrectCount = 0;
    numCorrect.textContent = correctCount;
    numIncorrect.textContent = incorrectCount;
    
    sessionQuestions = [];
    currentQuestionIndex = 0;
    askedQuestionIds = [];
    
    currentQuestionAttempts = 0;
    
    feedback.style.display = 'none';
    feedback.className = 'feedback';
    answerBox.value = '';
    
    questionHolder.innerHTML = 'click "Next Question" to start';
    
    nextQuestion.classList.remove('hidden');
    
    endSessionModal.style.display = 'none';
    
    getInitialAccuracies();
});

      homeBtn.addEventListener('click', function() {
        window.location.href = 'main.html';
      });

    });
  </script>
