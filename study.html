const supabase_key = 'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'

            //Update topic performance function
    async function updateTopicPerformance(topicId, studentId, wasCorrect) {
      // Get current performance
      const {data: currentPerformance, error} = await supabaseClient
        .from('topic_performance')
        .select('*')
        .eq('student_id', studentId)
        .eq('topic_id', topicId);
      //If the record exists update it
      if (currentPerformance && currentPerformance.length > 0) {
        const updatedPerformance = currentPerformance[0];

        //Calculate the new values
        const newAttempted = updatedPerformance.questions_attempted +1;
        const newCorrect = updatedPerformance.questions_correct + (wasCorrect ? 1 : 0);
        const newAccuracy = (newCorrect / newAttempted) * 100
        
        //Update the record with the new data
        const{error} = await supabaseClient 
        .from('topic_performance')
        .update({
            questions_attempted: newAttempted,
            questions_correct: newCorrect,
            accuracy_percent: Math.round(newAccuracy)
        })
        .eq('perfomance_id', updatedPerformance.perfomance_id);
        
      }
      //If the record doesnt exist create a new one
      else {
        const {error} = await supabaseClient
          .from('topic_performance')
          .insert([{
            student_id: studentId,
            topic_id: topicId,
            questions_attempted: 1,
            questions_correct: wasCorrect ? 1 : 0,
            accuracy_percent: wasCorrect ? 100 : 0
          }])
      }
      
    }
    //Add a click handler
    //Function to check answer on click
    // Check answer button
checkAnswer.addEventListener('click', async function() {
  // Check if there's a question to answer
  if (sessionQuestions.length === 0) {
    feedback.textContent = 'Please click Next Question first';
    feedback.className = 'feedback incorrect';
    feedback.style.display = 'block';
    return;
  }
  
  // Get user answer
  const userAnswer = answerBox.value.trim().toLowerCase();
  if (!userAnswer) {
    feedback.textContent = 'Please enter an answer';
    feedback.className = 'feedback incorrect';
    feedback.style.display = 'block';
    return;
  }
  
  // Get current question
  const currentQuestion = sessionQuestions[currentQuestionIndex];
  const correctAnswer = currentQuestion.correct_answer.toLowerCase();
  const topicId = currentQuestion.topic_id;
  
  // Check if correct
  if (userAnswer === correctAnswer) {
    feedback.textContent = 'Correct!';
    feedback.className = 'feedback correct';
    correctCount++;
    numCorrect.textContent = correctCount;
    await updateTopicPerformance(topicId, student_id, true);
  } else {
    feedback.textContent = `Incorrect. The correct answer is: ${currentQuestion.correct_answer}`;
    feedback.className = 'feedback incorrect';
    incorrectCount++;
    numIncorrect.textContent = incorrectCount;
    await updateTopicPerformance(topicId, student_id, false);
  }
  
  // Show feedback
  feedback.style.display = 'block';
  
  // Mark question as answered
  askedQuestionIds.push(currentQuestion.question_id);
  
  // Move to next question index
  currentQuestionIndex++;
  console.log(' Next question index:', currentQuestionIndex);
  if (currentQuestionIndex < sessionQuestions.length) {
  displayQuestion();
  } 
  else {
  console.log('loading new session');
  await loadNewSession();
  }
});

//Order the topics
async function orderTopics () {
const weaknesses = await getWeaknesses()
let {data: orderedTopics, error} = await supabaseClient
.from('topic_performance')
.select('topic_id, accuracy_percent')
.eq('student_id', 'StudentTest')

// Bubble sort for array of objects
let len = orderedTopics.length;
for (let i = 0; i < len - 1; i++) {
for (let j = 0; j < len - 1 - i; j++) {
  // Use .accuracy_percent instead of [1]
  if (orderedTopics[j].accuracy_percent > orderedTopics[j + 1].accuracy_percent) {
    let temp = orderedTopics[j];
    orderedTopics[j] = orderedTopics[j + 1];
    orderedTopics[j + 1] = temp;
  }
}
}

console.log(orderedTopics);
return orderedTopics;
}
//Get the preffered learning style
async function getStyle(){
//Query learning style
const{data:learningStyle , error} = await supabaseClient
 .from('adaptive_settings')
 .select('preferred_style')
 .eq('student_id', 'StudentTest')
console.log(learningStyle)
return learningStyle;

// Function to get the questions
async function getQuestion(topicId) {
console.log('Getting questions for topic:', topicId);

// Get the style
let style = await getStyle();
let preferredStyle = style && style.length > 0 ? style[0].preferred_style : 'mixed';

//Get the current accuracy
const {data:accuracy} = await supabaseClient
.from('topic_performance')
.select('accuracy_percent')
.eq('student_id', 'StudentTest')
.eq('topic_id', topicId);

//set difficulty based on accuracy 
let accuracyValue = 50; // Default
let difficultyValue = 3; // Default medium

if (accuracy && accuracy.length > 0) {
accuracyValue = accuracy[0].accuracy_percent;

// Convert accuracy to difficulty level 1-5
if (accuracyValue < 40) {
  difficultyValue = 1; // Easy
}
else if (accuracyValue >= 40 && accuracyValue < 60) {
  difficultyValue = 2; // Medium-Easy
}
else if (accuracyValue >= 60 && accuracyValue < 70) {
  difficultyValue = 3; // Medium
}
else if (accuracyValue >= 70 && accuracyValue < 80) {
  difficultyValue = 4; // Medium-Hard
}
else if (accuracyValue >= 80) {
  difficultyValue = 5; // Hard
}
}

console.log('Trying difficulty:', difficultyValue);

// First try: Get questions with specific difficulty
let { data: questions, error } = await supabaseClient
.from('questions')
.select('*')
.eq('question_type', preferredStyle)
.eq('topic_id', topicId)
.eq('difficulty', difficultyValue);

// If no questions found, try all difficulties for this topic
if (!questions || questions.length === 0) {
console.log('No questions at difficulty', difficultyValue, 'trying all difficulties');

const { data: allQuestions } = await supabaseClient
  .from('questions')
  .select('*')
  .eq('question_type', preferredStyle)
  .eq('topic_id', topicId);

questions = allQuestions;
}

// Filter out questions that have already been answered
if (questions && questions.length > 0) {
const unansweredQuestions = questions.filter(q => !askedQuestionIds.includes(q.question_id));
console.log('Total questions found:', questions.length);
console.log('Already answered IDs:', askedQuestionIds);
console.log('Unanswered questions:', unansweredQuestions.length);
return unansweredQuestions;
}

return [];
}

// Load new session
async function loadNewSession() {
orderedTopicsList = await orderTopics();
if (!orderedTopicsList || orderedTopicsList.length === 0) return;

// Try each topic until we find one with questions
for (let i = 0; i < orderedTopicsList.length; i++) {
currentTopicIndex = i;
currentTopicId = orderedTopicsList[i].topic_id;
console.log('Trying topic:', currentTopicId);

sessionQuestions = await getQuestion(currentTopicId);

if (sessionQuestions.length > 0) {
  console.log('Found questions for topic:', currentTopicId);
  currentQuestionIndex = 0;
  displayQuestion();
  return;
}
}

// If we get here, no topics have questions
questionHolder.innerHTML = 'No questions available for any topic';
}

questionHolder.innerHTML = currentQuestion.question_text;
} else {
console.log('No question to display');
questionHolder.innerHTML = 'No questions available';
}
}

}
