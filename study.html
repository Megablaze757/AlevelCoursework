    /* 2 column layout */
    .layout {

      align-items: flex-start;
      gap: 2rem;

      width: 100%;
    }

    /* Left Column */
    .scorePanel {
    min-width: 170px;
    }
    
    .numCorrectContainer {
      display: flex;
      gap: 15px;
      flex-direction: column;
      background: white;
      padding: 15px 25px;

      margin-bottom: 15px;

    /* Number correct box */
    .numCorrect {
      background: #e8f5e9;

      font-size: 18px;

  }

/* Number incorrect box */

        font-weight: bold;
        font-size: 18px;
        border-left: 4px solid #ef5350;
    }
    
    /* Card Area  right Column*/

      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1rem;
      flex: 1;
    }
    
    /* End Session button */
    .endSession {
      background: transparent;

      color: #546e7a;
      padding: 10px 25px;

      font-weight: 600;
      margin-bottom: 25px;

}

    border-style: solid;
}

      font-size: 18px;
      color: #263238;

  .answerBox:focus {

      box-shadow: 0 0 0 3px rgba(33,150,243,0.2);
}

    /* Check answer button */
.checkAnswer {
background: #1976d2;
color: white;
padding: 15px 30px;
border-radius: 50px;
font-weight: bold;
font-size: 18px;
text-align: center;
cursor: pointer;
transition: background 0.2s;
display: inline-block;
min-width: 150px;
}

.checkAnswer:hover {
background: #1565c0;
}

.checkAnswer:active {
transform: scale(0.98);
}
    /* Feedback message Styling */
.feedback {
margin-top: 20px;
padding: 15px 20px;
border-radius: 50px;
font-weight: bold;
font-size: 18px;
text-align: center;
transition: all 0.3s ease;
display: none; 
}

.feedback.correct {
background: #e8f5e9;
color: #2e7d32;

}
/* Incorrect message styling */
.feedback.incorrect {
background: #ffebee;
color: #c62828;
border: 2px solid #ef5350;
display: block;
}

}

// End Session button click handler
endSession.addEventListener('click', async function() {
  // Get all topics
  const { data: topics } = await supabaseClient
    .from('topics')
    .select('topic_id, topic_name');
  
  // Get current performance
  const { data: performances } = await supabaseClient
    .from('topic_performance')
    .select('topic_id, accuracy_percent')
    .eq('student_id', student_id);
  
  // Create an object of accuracies
  let currentAccuracies = {};
  if (performances) {
    performances.forEach(p => {
      currentAccuracies[p.topic_id] = p.accuracy_percent || 0;
    });
  }
  
  // Build topic list HTML
  let topicHTML = '';
  for (let topic of topics) {
    const topicId = topic.topic_id;
    const initial = initialTopicAccuracies[topicId] || 0;
    const current = currentAccuracies[topicId] || 0;
    const change = current - initial;
    const changeClass = change >= 0 ? 'positive' : 'negative';
    const changeSymbol = change >= 0 ? '+' : '';
    
    topicHTML += `
      <div class="topicItem">
        <div class="topicName">${topic.topic_name}</div>
        <div class="topicBefore">${initial}%</div>
        <div class="topicAfter">${current}%</div>
        <div class="topicChange ${changeClass}">${changeSymbol}${change}%</div>
      </div>
    `;
  }
  
  topicList.innerHTML = topicHTML;
  
  // Update session stats
  const totalQuestions = correctCount + incorrectCount;
  const accuracy = totalQuestions > 0 ? Math.round((correctCount/totalQuestions)*100) : 0;
  
  modalCorrect.textContent = correctCount;
  modalIncorrect.textContent = incorrectCount;
  modalAccuracy.textContent = accuracy + '%';
  

  // Show modal
  endSessionModal.style.display = 'flex';
});
