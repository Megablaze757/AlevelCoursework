<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
 <!-- Class Selection for Teachers -->
<div>
    <label for="classSelect">Select Class:</label>
    <select id="classSelect">
        <option value="">Loading classes...</option>
    </select>
    <button id="loadClassBtn">View Class Analytics</button>
    <div id="classMessage"></div>
    
</div>

<div id="studentSection" style="margin-top: 20px;">
    <label for="studentSelect">Select Student:</label>
    <select id="studentSelect">
        <option value="">Select a class first...</option>
    </select>
</div>
    <script>
        const supabaseClient = supabase.createClient(
            'https://pxjndwrkafegopsolnde.supabase.co',
            'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
        );
      let teacherId = 'TeacherTest'

      async function loadClassesData(){
        const { data: classes, error: classesError } = await supabaseClient
          .from('classes')
          .select('class_code, class_name')
          .eq('school', 'test1')
          .order('class_name');
        
        console.log('Classes:', classes);
        console.log('Error:', classesError);
        
        const classSelect = document.getElementById('classSelect');
        classSelect.innerHTML = '<option value="">Select a class...</option>';

        if (classes && classes.length > 0) {
            classes.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls.class_code;
                option.textContent = cls.class_name || `Class ${cls.class_code}`;
                classSelect.appendChild(option);
            });
        } else {
            classSelect.innerHTML = '<option value="">No classes available for your school</option>';
        }
      } 
    
    document.getElementById('loadClassBtn').addEventListener('click', loadStudents)
    
    async function loadStudents() {
        const classSelect = document.getElementById('classSelect');
        const selectedClass = classSelect.value;

        if (!selectedClass || selectedClass === '') {
            return;
        }

        const { data: students, error } = await supabaseClient
            .from('students')
            .select('student_id')
            .eq('school', 'test1')
            .eq('class_code', parseInt(selectedClass));
        
        console.log('Students:', students);
        console.log('Students error:', error);
        
        if (students && students.length > 0) {
            const studentIds = students.map(s => s.student_id);
            
            const { data: userInfo, error: userError } = await supabaseClient
                .from('userinfo')
                .select('username, name')
                .in('username', studentIds);
            
            console.log('UserInfo:', userInfo);
            
            const studentSelect = document.getElementById('studentSelect');
            studentSelect.innerHTML = '<option value="">Select a student...</option>';
            
            userInfo.forEach(user => {
                const option = document.createElement('option');
                option.value = user.username;
                option.textContent = user.name || user.username;
                studentSelect.appendChild(option);
            });
        } else {
            document.getElementById('studentSelect').innerHTML = '<option value="">No students in this class</option>';
        }
    }
    
  loadClassesData();
    </script>
</body>
</html>
