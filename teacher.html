<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
 <div>
    <label for="classSelect">Select Class:</label>
    <select id="classSelect">
        <option value="">Loading classes...</option>
    </select>
    <button id="loadClassBtn">View Class Analytics</button>
    <div id="classMessage"></div>
    
</div>

<div id="studentSection" style="margin-top: 20px;">
    <label for="studentSelect">Select Student:</label>
    <select id="studentSelect">
        <option value="">Select a class first...</option>
    </select>
    <button id="loadStudentsBtn">View Students Analytics</button>
</div>
    <div class='statsContainer'>
        <div class='statsBox'>
            <button class='backButton' id='backToHome'>← Back to Home</button>
            <h2 id="topicName">Overall Performance</h2>
            <div style="margin-top: 20px;">
                <div>
                    Total Accuracy:
                    <span id="accuracy">0%</span>
                </div>   
                <div>
                    Total Questions
                    <span id="totalQuestions">0</span>
                </div>   
                <div>
                    Correct Answers
                    <span id="correct">0</span>
                </div>   
                <div>
                    Incorrect Answers
                    <span id="incorrect">0</span>
                </div>
            </div>
        </div>
    </div>
        <div class='topicsContainer'>
        <div class='topicsBox'>
            <h2>All topics</h2>
            <div id='topicsList'></div>
        </div>
                <div class='strengthsContainer'>
        <div class='strengthsBox'>
            <h2>Strengths</h2>
            <div id='strengthsList'></div> 
        </div>    
    </div>
    
    <div class='weaknessContainer'>
        <div class='weaknessesBox'>
            <h2>Weaknesses</h2>
            <div id='weaknessesList'></div> 
        </div>    
    </div>
    <script>
        const supabaseClient = supabase.createClient(
            'https://pxjndwrkafegopsolnde.supabase.co',
            'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
        );
      let teacherId = 'TeacherTest'

      async function loadClassesData(){
        const { data: teacherInfo, error: teacherError } = await supabaseClient
          .from('userinfo')
          .select('school')
          .eq('username', teacherId)
          .eq('user_type', 'Teacher')
          .single();
        
        const { data: classes, error: classesError } = await supabaseClient
          .from('classes')
          .select('class_code, class_name')
          .eq('school', teacherInfo.school)
          .order('class_name')

        const classSelect = document.getElementById('classSelect');
        classSelect.innerHTML = '<option value="">Select a class...</option>';

        if (classes && classes.length > 0) {
            classes.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls.class_code;
                option.textContent = cls.class_name || `Class ${cls.class_code}`;
                classSelect.appendChild(option);
            });
        } else {
            classSelect.innerHTML = '<option value="">No classes available for your school</option>';
        }
      } 

    document.getElementById('loadClassBtn').addEventListener('click', loadStudents)
   
    async function loadStudents() {
        const classSelect = document.getElementById('classSelect');
        const studentSelect = document.getElementById('studentSelect');
        const selectedClass = classSelect.value;
        console.log(selectedClass)

        if (!selectedClass || selectedClass === '') {
            return;
        }

        const { data: teacherInfo, error: teacherError } = await supabaseClient
            .from('userinfo')
            .select('school')
            .eq('username', teacherId)
            .eq('user_type', 'Teacher')
            .single();

        const {data: classes} = await supabaseClient
            .from('classes')
            .select('class_code')
            .eq('class_code', selectedClass)
        
        const { data: students, error } = await supabaseClient
            .from('userinfo')
            .select('name')
            .eq('class', selectedClass);
            console.log(students);
            
        studentSelect.innerHTML = '<option value="">Select a student...</option>';

        if (students && students.length > 0) {
            students.forEach(s => {
                const option = document.createElement('option');
                option.value = s.name;
                option.textContent = s.name || `student ${s.name}`;
                studentSelect.appendChild(option);
            });
        } else {
            studentSelect.innerHTML = '<option value="">No students in the class</option>';
        }
    }
    
        async function loadAnalytics() {
            const studentSelect = document.getElementById('studentSelect');
            const studentId = studentSelect.value;
            
            if (!studentId || studentId === '') {
                console.log('No student selected');
                return;
            }
            
             const{data: scores} = await supabaseClient
                .from('topic_performance')
                .select('*')
                .eq('student_id', studentId);
            console.log(scores);
            const performance = scores;

            let totalQuestions = 0;
            let totalCorrect = 0;
            console.log(performance)

            performance.forEach( p => {
                totalQuestions += p.questions_attempted || 0;
                totalCorrect += p.questions_correct || 0;                
            });
            
            const totalIncorrect = totalQuestions - totalCorrect;
            const totalAccuracy = totalQuestions > 0 ? Math.round((totalCorrect/totalQuestions) * 100) : 0;
            console.log('total Questions ', totalQuestions);
            console.log('total correct ', totalCorrect)
            console.log('total incorrect ', totalIncorrect)
            console.log('total accuracy ', totalAccuracy)
            
            document.getElementById('accuracy').textContent = totalAccuracy + '%';
            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('correct').textContent = totalCorrect;
            document.getElementById('incorrect').textContent = totalIncorrect;
            document.getElementById('topicName').textContent = 'Overall Performance';

        }
          async function loadTopicStats(topicId, topicName){
            const studentSelect = document.getElementById('studentSelect');
            const studentId = studentSelect.value;
            
            document.getElementById('topicName').textContent = topicName;
  
            const {data: topicPerf} = await supabaseClient
                .from('topic_performance')
                .select('*')
                .eq('student_id', studentId)
                .eq('topic_id', topicId);
            
            if (topicPerf && topicPerf.length > 0) {
                const attempted = topicPerf[0].questions_attempted || 0;
                const correct = topicPerf[0].questions_correct || 0;
                const incorrect = attempted - correct;
                const accuracy = attempted > 0 ? Math.round((correct/attempted) * 100) : 0;
                
                document.getElementById('accuracy').textContent = accuracy + '%';
                document.getElementById('totalQuestions').textContent = attempted;
                document.getElementById('correct').textContent = correct;
                document.getElementById('incorrect').textContent = incorrect;
            } else {
                document.getElementById('accuracy').textContent = '0%';
                document.getElementById('totalQuestions').textContent = '0';
                document.getElementById('correct').textContent = '0';
                document.getElementById('incorrect').textContent = '0';
            }
        }
        
        async function loadTopic(){
            const topicsList = document.getElementById('topicsList');
            
            const{data:topics, error} = await supabaseClient
                .from('topics')
                .select('topic_name, topic_id');
            console.log(topics);
            
            topicsList.innerHTML = '';
            
            topics.forEach(topic => {
                const button = document.createElement('button');
                button.className = 'topicButton';
                button.textContent = topic.topic_name;
                button.setAttribute('data-topic-id', topic.topic_id);
                topicsList.appendChild(button);

                button.addEventListener('click', function() {
                    loadTopicStats(topic.topic_id, topic.topic_name);
                });
            });
        }
                async function loadStrengths() {
            const strengthsList = document.getElementById('strengthsList');
            strengthsList.innerHTML = '';
            
            const{data: strengths, error} = await supabaseClient
                .from('strengths')
                .select('topics(topic_name)')
                .eq('student_id', studentId);
            
            strengths.forEach ( s => {
                const div = document.createElement('div');
                div.className = 'strengthItem';
                div.textContent = s.topics.topic_name;
                strengthsList.appendChild(div);
            });
        }
        
        async function loadWeaknesses() {
            const weaknessesList = document.getElementById('weaknessesList');
            weaknessesList.innerHTML = '';
            
            const{data: weaknesses, error} = await supabaseClient
                .from('weaknesses')
                .select('topics(topic_name)')
                .eq('student_id', studentId);
            
            weaknesses.forEach ( w => {
                const div = document.createElement('div');
                div.className = 'weaknessItem';
                div.textContent = w.topics.topic_name;
                weaknessesList.appendChild(div);
            });
        }
        
        
    document.getElementById('loadStudentsBtn').addEventListener('click', loadAnalytics)

  loadClassesData();
  loadTopic();
    </script>
</body>
</html>
