<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
 <!-- Class Selection for Teachers -->
<div>
    <label for="classSelect">Select Class:</label>
    <select id="classSelect">
        <option value="">Loading classes...</option>
    </select>
    <button id="loadClassBtn">View Class Analytics</button>
    <div id="classMessage"></div>
    
</div>

<div id="studentSection" style="margin-top: 20px;">
    <label for="studentSelect">Select Student:</label>
    <select id="studentSelect">
        <option value="">Select a class first...</option>
    </select>
</div>
    <script>
        const supabaseClient = supabase.createClient(
            'https://pxjndwrkafegopsolnde.supabase.co',
            'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
        );
      let teacherId = 'TeacherTest'

      async function loadClassesData(){
        //  Get teacher's school from userinfo
        const { data: teacherInfo, error: teacherError } = await supabaseClient
          .from('userinfo')
          .select('school')
          .eq('username', teacherId)
          .eq('user_type', 'Teacher')
          .single();
        
        // Get classes for that school
        const { data: classes, error: classesError } = await supabaseClient
          .from('classes')
          .select('class_code, class_name')
          .eq('school', teacherInfo.school)
          .order('class_name')
        // Populate the dropdown
        const classSelect = document.getElementById('classSelect');
        classSelect.innerHTML = '<option value="">Select a class...</option>';

        if (classes && classes.length > 0) {
            classes.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls.class_code;
                option.textContent = cls.class_name || `Class ${cls.class_code}`;
                classSelect.appendChild(option);
            });
        } else {
            classSelect.innerHTML = '<option value="">No classes available for your school</option>';
        }
      } 
    //Event listener for the class dropdown to trigger students being loaded
    document.getElementById('loadClassBtn').addEventListener('click', loadStudents)
    //Function to load the students based on the class
    async function loadStudents() {
        const classSelect = document.getElementById('classSelect');
        const selectedClass = classSelect.value;

        if (!selectedClass || selectedClass === '') {
            return;
        }

        // Get teacher's school
        const { data: teacherInfo, error: teacherError } = await supabaseClient
            .from('userinfo')
            .select('school')
            .eq('username', teacherId)
            .eq('user_type', 'Teacher')
            .single();

        //get class code
        const {data: classes,error} = await supabaseClient
            .from('classes')
            .select('class_code')
            .eq('class_name', selectedClass)
        
        // Get students 
        const { data: students, error } = await supabaseClient
            .from('userinfo')
            .select('name')
            .eq('school', teacherInfo.school)
            .eq('class', classes.class_code);
                console.log(students);
            }
    
  // Call the function
  loadClassesData();
    </script>
</body>
</html>
