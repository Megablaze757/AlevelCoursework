<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div>
        <label for="classSelect">Select Class:</label>
        <select id="classSelect">
            <option value="">Loading classes...</option>
        </select>
        <button id="loadClassBtn">View Class Analytics</button>
        <div id="classMessage"></div>
    </div>

    <div id="studentSection" style="margin-top: 20px;">
        <label for="studentSelect">Select Student:</label>
        <select id="studentSelect">
            <option value="">Select a class first...</option>
        </select>
    </div>

    <script>
        const supabaseClient = supabase.createClient(
            'https://pxjndwrkafegopsolnde.supabase.co',
            'sb_publishable_eOUJ3K3GNczOncszRwYhyA_A1QAw72F'
        );

        async function loadClasses() {
            const { data: classes } = await supabaseClient
                .from('classes')
                .select('class_code, class_name')
                .eq('school', 'test1\n');

            console.log('Classes loaded:', classes);

            const select = document.getElementById('classSelect');
            select.innerHTML = '<option value="">Select a class...</option>';
            
            if (classes && classes.length > 0) {
                classes.forEach(cls => {
                    const option = document.createElement('option');
                    option.value = cls.class_code;
                    option.textContent = cls.class_name;
                    select.appendChild(option);
                });
            }
        }

        async function checkData() {
            const { data: allStudents } = await supabaseClient
                .from('students')
                .select('*');
            console.log('All students in DB:', allStudents);
        }
        
        checkData();

        async function loadStudents() {
            const classCode = document.getElementById('classSelect').value;
            if (!classCode) return;

            console.log('Searching for class_code:', classCode, 'type:', typeof classCode);

            const { data: students, error } = await supabaseClient
                .from('students')
                .select('student_id, class_code')
                .eq('class_code', classCode);

            console.log('Students query result:', students);
            console.log('Students query error:', error);

            if (!students || students.length === 0) {
                document.getElementById('studentSelect').innerHTML = '<option value="">No students</option>';
                return;
            }

            const { data: users } = await supabaseClient
                .from('userinfo')
                .select('username, name')
                .in('username', students.map(s => s.student_id))
                .eq('school', 'test1\n');

            const select = document.getElementById('studentSelect');
            select.innerHTML = '<option value="">Select a student...</option>';
            
            if (users) {
                users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.username;
                    option.textContent = user.name || user.username;
                    select.appendChild(option);
                });
            }
        }

        document.getElementById('loadClassBtn').addEventListener('click', loadStudents);
        loadClasses();
    </script>
</body>
</html>
